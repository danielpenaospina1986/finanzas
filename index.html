<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
:root{
--purple:#5856d6;--blue:#007aff;--teal:#34aadc;--ltblue:#5ac8fa;--green:#4cd964;
--pink:#ff2d55;--red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;--gray:#8e8e93;
--gray3:#c7c7cc;--gray5:#e5e5ea;--gray6:#f2f2f7;
--bg:#f2f2f7;--card:#fff;--sep:rgba(60,60,67,.12);--text:#000;--text2:#3c3c43;--text3:#8e8e93;
--safe-t:env(safe-area-inset-top,20px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-top:120px;padding-bottom:90px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding-top:var(--safe-t);background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep)}
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.nav-title{font-size:17px;font-weight:600}
.nav-a{font-size:17px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer;padding:4px}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding-bottom:calc(var(--safe-b) + 8px);background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;font-size:10px;font-weight:500;color:var(--gray);cursor:pointer}
.tab.active{color:var(--blue)}
.tab svg{width:25px;height:25px;margin-bottom:1px}
.content{padding:0 16px 20px}
.sec{display:none}.sec.active{display:block}
.sT{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:20px 0 6px}
.grp{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 0 0 .5px var(--sep)}
.dcard{padding:16px;cursor:pointer}
.dcard-top{display:flex;justify-content:space-between;align-items:center}
.dcard-label{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.dcard-arrow{font-size:20px;color:var(--gray3);transition:transform .2s}.dcard-arrow.open{transform:rotate(180deg)}
.dcard-vals{display:flex;gap:16px;margin-top:6px}
.dcard-big{font-size:28px;font-weight:700;letter-spacing:-.5px}
.dcard-sm{font-size:15px;font-weight:500;color:var(--text3);align-self:flex-end;margin-bottom:3px}
.dcard-detail{overflow:hidden;max-height:0;transition:max-height .3s ease}.dcard-detail.open{max-height:1000px}
.dcard-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:.5px solid var(--sep);font-size:15px}
.tl-item{display:flex;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--sep);align-items:flex-start}.tl-item:last-child{border-bottom:none}
.tl-item.pri0{background:rgba(255,45,85,.08);border-left:3px solid #ff2d55}.tl-item.pri1{background:rgba(255,149,0,.06);border-left:3px solid #ff9500}.tl-item.pri2{border-left:3px solid #007aff}.tl-item.pri3{border-left:3px solid #c7c7cc}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tl-body{flex:1;min-width:0}
.tl-name{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-sub{font-size:13px;color:var(--text3);margin-top:1px}
.tl-amt{font-size:16px;font-weight:600;flex-shrink:0;margin-left:8px}
.tl-alert{display:flex;gap:8px;padding:10px 16px;background:rgba(255,45,85,.1);border-bottom:.5px solid var(--sep);font-size:13px;font-weight:500;color:#ff2d55;align-items:center}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer}
.row:last-child{border-bottom:none}.row:active{background:var(--gray6)}
.row-body{flex:1;min-width:0}.row-t{font-size:16px}.row-s{font-size:13px;color:var(--text3);margin-top:1px}
.row-r{font-size:16px;font-weight:500;flex-shrink:0}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:2px 8px;border-radius:10px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.act-btn{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:14px 16px;border:none;font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;box-shadow:0 0 0 .5px var(--sep);text-align:left}
.act-btn:active{background:var(--gray6)}
.act-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.seg{display:flex;background:rgba(142,142,147,.12);border-radius:8px;padding:2px;margin-bottom:14px}
.seg-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text3);border-radius:7px;cursor:pointer;font-family:inherit}
.seg-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
input,select{width:100%;padding:12px 16px;font-size:16px;border:.5px solid var(--sep);background:var(--card);border-radius:10px;margin-bottom:8px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.btn{width:100%;padding:14px;font-size:17px;font-weight:600;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}.btn:active{opacity:.8}
.btn-blue{background:var(--blue)}.btn-green{background:var(--green)}.btn-gray{background:rgba(142,142,147,.12);color:var(--blue)}
.row-2{display:flex;gap:8px}.row-2>*{flex:1}
.lbl{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:4px;display:block}.fg{margin-bottom:14px}
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-l{font-size:12px;color:var(--text3);width:72px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-t{flex:1;height:22px;background:var(--gray6);border-radius:6px;overflow:hidden}
.bar-f{height:100%;border-radius:6px;min-width:2px}
.bar-v{font-size:12px;font-weight:600;color:var(--text2);width:70px;flex-shrink:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.ov.open{display:flex}
.sh{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding-bottom:calc(var(--safe-b)+20px);animation:shUp .3s ease}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:5px;border-radius:3px;background:var(--gray3);margin:8px auto 4px}
.sh-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.sh-title{font-size:17px;font-weight:600}.sh-close{font-size:17px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.sh-body{padding:0 16px 16px}
.sync-t{width:100%;min-height:200px;font-size:12px;font-family:'SF Mono',Menlo,monospace;padding:12px;background:var(--card);border:.5px solid var(--sep);border-radius:8px;color:var(--text);resize:none;margin-bottom:12px;line-height:1.5}
.toast{position:fixed;top:calc(var(--safe-t)+60px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;display:none}
.toast.show{display:block;animation:fio 2s ease}
@keyframes fio{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.hist-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--sep);font-size:14px}.hist-row:last-child{border-bottom:none}
@media(prefers-color-scheme:dark){
:root{--bg:#000;--card:#1c1c1e;--sep:rgba(84,84,88,.65);--text:#fff;--text2:#ebebf5;--text3:#8e8e93;--gray5:#2c2c2e;--gray6:#1c1c1e}
.navbar,.tabbar{background:rgba(28,28,30,.88)}input,select{background:#2c2c2e;color:#fff;border-color:rgba(84,84,88,.4)}
.seg{background:rgba(118,118,128,.24)}.seg-btn.active{background:#2c2c2e}}
</style>
</head>
<body>
<div class="navbar"><div class="nav-row"><div class="nav-title" id="navTitle">Finanzas</div><button class="nav-a" id="navRight" onclick="openSync()">Sync</button></div></div>
<div class="content">
<div id="s_dash" class="sec active"></div>
<div id="s_gastos" class="sec"></div>
<div id="s_deudas" class="sec"></div>
<div id="s_inv" class="sec"></div>
<div id="s_stats" class="sec"></div>
</div>
<div class="tabbar">
<div class="tab active" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 13h6a1 1 0 001-1V4a1 1 0 00-1-1H4a1 1 0 00-1 1v8a1 1 0 001 1zm0 8h6a1 1 0 001-1v-4a1 1 0 00-1-1H4a1 1 0 00-1 1v4a1 1 0 001 1zm10 0h6a1 1 0 001-1v-8a1 1 0 00-1-1h-6a1 1 0 00-1 1v8a1 1 0 001 1zm0-18v4a1 1 0 001 1h6a1 1 0 001-1V3a1 1 0 00-1-1h-6a1 1 0 00-1 1z"/></svg><span>Inicio</span></div>
<div class="tab" onclick="go('gastos')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>Gastos</span></div>
<div class="tab" onclick="go('deudas')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 14H4V6h16v12z"/></svg><span>Deudas</span></div>
<div class="tab" onclick="go('inv')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg><span>Inversiones</span></div>
<div class="tab" onclick="go('stats')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg><span>Analisis</span></div>
</div>
<div class="toast" id="toast"></div>
<div class="ov" id="shSync" onclick="if(event.target===this)cls('shSync')"><div class="sh"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title">Sync con Claude</div><button class="sh-close" onclick="cls('shSync')">OK</button></div><div class="sh-body"><p style="font-size:14px;color:var(--text3);margin-bottom:10px">Copia y pega en Claude.</p><textarea class="sync-t" id="syncText" readonly></textarea><button class="btn btn-green" onclick="cpSync()">Copiar</button></div></div></div>
<div class="ov" id="shGasto" onclick="if(event.target===this)cls('shGasto')"><div class="sh"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title">Registrar gasto</div><button class="sh-close" onclick="cls('shGasto')">Cancelar</button></div><div class="sh-body" id="gastoForm"></div></div></div>
<div class="ov" id="shInv" onclick="if(event.target===this)cls('shInv')"><div class="sh"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title">Agregar inversion</div><button class="sh-close" onclick="cls('shInv')">Cancelar</button></div><div class="sh-body" id="invForm"></div></div></div>
<div class="ov" id="shEdit" onclick="if(event.target===this)cls('shEdit')"><div class="sh"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title" id="editTitle">Editar</div><button class="sh-close" onclick="cls('shEdit')">Cancelar</button></div><div class="sh-body" id="editBody"></div></div></div>
<div class="ov" id="shSaldo" onclick="if(event.target===this)cls('shSaldo')"><div class="sh"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title">Registrar saldo</div><button class="sh-close" onclick="cls('shSaldo')">Cancelar</button></div><div class="sh-body" id="saldoBody"></div></div></div>

<script>
const DB="https://finanzas-daniel-default-rtdb.firebaseio.com";
const fmt=n=>"$"+Math.round(n).toLocaleString("es-CO");
const fmtU=n=>"$"+n.toLocaleString("en-US")+" USD";
const CATS=["Mercado","Alimentacion","Transporte","Salud","Entretenimiento","Hogar","Ropa","Educacion","Otro"];
const TIPOS=["Gasto recurrente","Gasto unico","Imprevisto","Manutencion diaria","Ya pagado","Por pagar"];
const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const COL=["#007aff","#5856d6","#34aadc","#ff9500","#ff2d55","#4cd964","#5ac8fa","#ffcc00","#ff3b30"];

let D=null,curTab="dash",gSeg="fijos";

async function fb(m,p,d){try{const o={method:m,headers:{"Content-Type":"application/json"}};if(d)o.body=JSON.stringify(d);const r=await fetch(DB+"/"+p+".json",o);return await r.json()}catch{return null}}

const SEED={config:{tasa:3764,ingUSD:1311,deelUSD:1229,deelRec:"Q5 - 30 may"},
pagos:{q4_12:{q:"q4",n:"EPM cuota vencida",m:372500,tp:"cash",ej:false,pri:2,vence:"2025-05-16"},q4_13:{q:"q4",n:"Arriendo mayo",m:2338905,tp:"rappi",ej:false,pri:1,vence:"2025-05-15"},q5_3:{q:"q5",n:"Manutencion hijos",m:680000,tp:"cash",ej:false,pri:0,vence:"2025-05-30"},q5_4:{q:"q5",n:"Servicios EPM",m:400000,tp:"cash",ej:false,pri:2,vence:"2025-05-30"},q5_5:{q:"q5",n:"Internet Claro",m:375000,tp:"cash",ej:false,pri:2,vence:"2025-05-30"},q5_6:{q:"q5",n:"Itau unificado",m:523000,tp:"cash",ej:false,pri:1,vence:"2025-06-05"},q5_7:{q:"q5",n:"TC Rappi cuota",m:500000,tp:"cash",ej:false,pri:1,vence:"2025-05-30"},q5_ar:{q:"q5",n:"Arriendo junio",m:2338905,tp:"rappi",ej:false,pri:1,vence:"2025-06-01"},q6_1:{q:"q6",n:"Credito carro",m:1900000,tp:"cash",ej:false,pri:1,vence:"2025-06-15"},q6_2:{q:"q6",n:"Manutencion hijos",m:680000,tp:"cash",ej:false,pri:0,vence:"2025-06-15"},q6_3:{q:"q6",n:"Credito papa",m:280000,tp:"cash",ej:false,pri:2,vence:"2025-06-15"},q6_4:{q:"q6",n:"TC Bancolombia",m:190000,tp:"cash",ej:false,pri:2,vence:"2025-06-16"},q6_5:{q:"q6",n:"TC Atletico Nal",m:42000,tp:"cash",ej:false,pri:3,vence:"2025-06-20"},q6_6:{q:"q6",n:"Itau unificado",m:523000,tp:"cash",ej:false,pri:1,vence:"2025-07-05"},q6_7:{q:"q6",n:"TC Rappi cuota",m:500000,tp:"cash",ej:false,pri:1,vence:"2025-06-15"},q6_8:{q:"q6",n:"Claude Pro",m:72000,tp:"cash",ej:false,pri:3,vence:"2025-06-01"}},
deudas:{d1:{n:"Itau unificado",saldo:null,cuota:523000,meses:84,pag:0,det:"1er pago 5 jun",conf:false,cat:"entidad",hist:{}},d2:{n:"TC Rappi plan",saldo:null,cuota:500000,meses:12,pag:0,det:"Activado mayo",conf:false,cat:"entidad",hist:{}},d3:{n:"Credito carro",saldo:null,cuota:1900000,det:"Finandina",conf:false,cat:"entidad",hist:{}},d4:{n:"TC Bancolombia",saldo:2144372,cuota:190000,det:"+ $67 USD",conf:true,cat:"entidad",hist:{}},d5:{n:"TC Atletico Nal",saldo:360672,cuota:42000,det:"Cancelada",conf:false,cat:"entidad",hist:{}},d6:{n:"Credito papa",saldo:null,cuota:280000,det:"Por confirmar",conf:false,cat:"entidad",hist:{}},d7:{n:"EPM atrasos",saldo:287500,det:"Resto factura $660k",conf:true,cat:"entidad",hist:{}},d8:{n:"Avance Deel",saldo:1229,det:"Recobro 30 may",conf:true,cat:"deel",usd:true,hist:{}},d9:{n:"Simon",saldo:0,det:"Saldado",conf:true,cat:"persona",hist:{}},d10:{n:"Mama",saldo:0,det:"Saldada",conf:true,cat:"persona",hist:{}}},
egresos:{e1:{n:"Arriendo",m:2338905,f:"Mensual"},e2:{n:"Credito carro",m:1900000,f:"Mensual"},e3:{n:"Manutencion hijos",m:680000,f:"Quincenal",mult:2},e4:{n:"Itau unificado",m:523000,f:"Desde junio"},e5:{n:"TC Rappi",m:500000,f:"Plan 12m"},e6:{n:"Internet",m:375000,f:"Mensual"},e7:{n:"EPM",m:400000,f:"Mensual"},e8:{n:"Credito papa",m:280000,f:"Mensual"},e9:{n:"TC Bancolombia",m:190000,f:"Mensual"},e10:{n:"Claude Pro",m:72000,f:"$20 USD"},e11:{n:"TC Atletico Nal",m:42000,f:"Mensual"}},
inversiones:{},gastos:{},pendientes:{p1:{n:"Display Samsung",det:"$500k-$700k",done:false},p2:{n:"Rayon bumper",det:"Cotizar",done:false},p3:{n:"Impuesto vehicular",det:"Max 21 jul",done:false},p4:{n:"Tiquetes hijos",det:"~$10M",done:false}}};

async function init(){D=await fb("GET","");if(!D||!D.config){await fb("PUT","",SEED);D=SEED}["gastos","inversiones","pendientes","deudas","pagos","egresos"].forEach(k=>{if(!D[k])D[k]={}});render()}
function go(t){curTab=t;document.querySelectorAll(".tab").forEach((e,i)=>e.classList.toggle("active",["dash","gastos","deudas","inv","stats"][i]===t));document.querySelectorAll(".sec").forEach(e=>e.classList.remove("active"));document.getElementById("s_"+t).classList.add("active");document.getElementById("navTitle").textContent={dash:"Finanzas",gastos:"Gastos",deudas:"Deudas",inv:"Inversiones",stats:"Analisis"}[t];document.getElementById("navRight").style.display=t==="dash"?"":"none";window.scrollTo(0,0);render()}
function cls(id){document.getElementById(id).classList.remove("open")}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.remove("show");void t.offsetWidth;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}

const priCol=["#ff2d55","#ff9500","#007aff","#8e8e93"];
const priLbl=["Critico","Alto","Normal","Bajo"];

function openSync(){
  const T=D.config?.tasa||3764,pagos=Object.entries(D.pagos||{}),deudas=Object.entries(D.deudas||{}),gastos=Object.entries(D.gastos||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)),egs=Object.entries(D.egresos||{});
  const totalEg=egs.reduce((s,[,e])=>s+e.m*(e.mult||1),0),ing=(D.config?.ingUSD||1311)*2*T,now=new Date();
  const gM=gastos.filter(([,g])=>{const d=new Date(g.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  let t=`SYNC FINANZAS - ${now.toLocaleDateString('es-CO')}\nTasa:$${T} | Ingreso:$${D.config?.ingUSD}USD/q | Deel:$${D.config?.deelUSD}USD\n\n`;
  t+=`== PAGOS PENDIENTES ==\n`;pagos.filter(([,p])=>!p.ej).sort((a,b)=>(a[1].pri||3)-(b[1].pri||3)).forEach(([,p])=>{t+=`[${priLbl[p.pri||3]}] ${p.n}: ${fmt(p.m)} (${p.vence||''})\n`});
  t+=`\n== DEUDAS ==\n`;deudas.forEach(([,d])=>{const sv=d.saldo===null?"NO CONFIRMADO":d.saldo===0?"SALDADO":d.usd?`$${d.saldo}USD`:fmt(d.saldo);t+=`${d.n}: ${sv}${d.cuota?' | '+fmt(d.cuota)+'/mes':''}${d.meses?' | '+d.meses+'m':''}\n`;if(d.hist){const hk=Object.keys(d.hist).sort().slice(-3);if(hk.length)t+=`  Hist: ${hk.map(k=>k+':'+fmt(d.hist[k])).join(', ')}\n`}});
  const invs=Object.entries(D.inversiones||{});if(invs.length){t+=`\n== INVERSIONES ==\n`;invs.forEach(([,i])=>t+=`${i.n}: ${i.moneda==='USD'?fmtU(i.monto):fmt(i.monto)}\n`)}
  t+=`\n== GASTOS MES: ${fmt(gM.reduce((s,[,g])=>s+g.monto,0))} ==\n`;const pc={};gM.forEach(([,g])=>pc[g.cat]=(pc[g.cat]||0)+g.monto);Object.entries(pc).forEach(([c,v])=>t+=`  ${c}: ${fmt(v)}\n`);
  t+=`\n== FLUJO ==\nEgresos: ${fmt(totalEg)}\nIngreso: ${fmt(ing)}\nBalance: ${fmt(ing-totalEg)}\n`;
  document.getElementById("syncText").value=t;document.getElementById("shSync").classList.add("open")}
async function cpSync(){try{await navigator.clipboard.writeText(document.getElementById("syncText").value);toast("✓ Copiado")}catch{document.getElementById("syncText").select()}}

async function saveConfig(){const tasa=parseInt(document.getElementById("ecT").value)||3764,ingUSD=parseInt(document.getElementById("ecI").value)||1311,deelUSD=parseInt(document.getElementById("ecD").value)||0,deelRec=document.getElementById("ecR").value;Object.assign(D.config,{tasa,ingUSD,deelUSD,deelRec});await fb("PATCH","config",{tasa,ingUSD,deelUSD,deelRec});cls("shEdit");toast("Configuracion guardada");render()}

function render(){
if(!D)return;
const T=D.config?.tasa||3764,pagos=Object.entries(D.pagos||{}),deudas=Object.entries(D.deudas||{}),gastos=Object.entries(D.gastos||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)),egs=Object.entries(D.egresos||{}),invs=Object.entries(D.inversiones||{});
const totalEg=egs.reduce((s,[,e])=>s+e.m*(e.mult||1),0),ing=(D.config?.ingUSD||1311)*2*T;
const now=new Date(),gM=gastos.filter(([,g])=>{const d=new Date(g.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}),totalGM=gM.reduce((s,[,g])=>s+g.monto,0);
let dCOP=0,dUSD=0;deudas.forEach(([,d])=>{if(d.saldo>0){if(d.usd)dUSD+=d.saldo;else dCOP+=d.saldo}});
let iCOP=0,iUSD=0;invs.forEach(([,i])=>{if(i.moneda==="USD")iUSD+=i.monto;else iCOP+=i.monto});
const pending=pagos.filter(([,p])=>!p.ej).sort((a,b)=>(a[1].pri||3)-(b[1].pri||3));
let h='';

// DASH
h+=`<div class="grp"><div class="dcard" onclick="this.querySelector('.dcard-detail').classList.toggle('open');this.querySelector('.dcard-arrow').classList.toggle('open')"><div class="dcard-top"><div class="dcard-label">Deuda total</div><div class="dcard-arrow">⌄</div></div><div class="dcard-vals"><div class="dcard-big" style="color:var(--red)">${fmt(dCOP+dUSD*T)}</div>${dUSD?`<div class="dcard-sm">${fmtU(dUSD)}</div>`:''}</div><div class="dcard-detail">`;
deudas.filter(([,d])=>d.saldo>0||d.saldo===null).forEach(([,d])=>{const sv=d.saldo===null?'Sin confirmar':d.usd?fmtU(d.saldo):fmt(d.saldo);const sc=d.saldo===null?'var(--orange)':'var(--red)';h+=`<div class="dcard-row"><span>${d.n}</span><span style="font-weight:600;color:${sc}">${sv}</span></div>`});
h+=`</div></div></div>`;

h+=`<div class="grp"><div class="dcard" onclick="this.querySelector('.dcard-detail').classList.toggle('open');this.querySelector('.dcard-arrow').classList.toggle('open')"><div class="dcard-top"><div class="dcard-label">Inversiones / Ahorros</div><div class="dcard-arrow">⌄</div></div><div class="dcard-vals"><div class="dcard-big" style="color:var(--green)">${iCOP||iUSD?fmt(iCOP+iUSD*T):'$0'}</div>${iUSD?`<div class="dcard-sm">${fmtU(iUSD)}</div>`:''}</div><div class="dcard-detail">`;
if(invs.length)invs.forEach(([,i])=>{h+=`<div class="dcard-row"><span>${i.n}</span><span style="font-weight:600;color:var(--green)">${i.moneda==='USD'?fmtU(i.monto):fmt(i.monto)}</span></div>`});
else h+=`<div style="padding:10px 0;color:var(--text3);font-size:14px">Sin registros</div>`;
h+=`</div></div></div>`;

h+=`<div class="actions"><button class="act-btn" onclick="openInv()"><div class="act-icon" style="background:var(--green)">+</div><div>Inversion<br><span style="font-size:12px;color:var(--text3)">o ahorro</span></div></button><button class="act-btn" onclick="openGasto()"><div class="act-icon" style="background:var(--blue)">+</div><div>Gasto<br><span style="font-size:12px;color:var(--text3)">registrar</span></div></button></div>`;

h+=`<div class="grp" style="padding:12px 16px;cursor:pointer" onclick="editConfig()"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:var(--text3)">Tasa COP/USD</div><div style="font-size:22px;font-weight:700">$${T}</div></div><div><div style="font-size:13px;color:var(--text3);text-align:right">Deel activo</div><div style="font-size:18px;font-weight:600;color:var(--orange)">${fmtU(D.config?.deelUSD||0)}</div></div></div></div>`;

h+=`<div class="sT">Proximos pagos</div><div class="grp">`;
if(!pending.length)h+=`<div style="padding:20px;text-align:center;color:var(--text3)">Todo al dia ✓</div>`;
else{
  // Sort chronologically by vence date
  const sorted=pending.sort((a,b)=>(a[1].vence||'z').localeCompare(b[1].vence||'z'));
  // Detect accumulations
  const nameCount={};sorted.forEach(([,p])=>{const base=p.n.replace(/\s*\(.*\)/,'').toLowerCase();nameCount[base]=(nameCount[base]||0)+1});
  const accum=Object.keys(nameCount).filter(k=>nameCount[k]>1);
  if(accum.length)h+=`<div class="tl-alert">⚠ Pagos acumulados: ${accum.join(', ')}</div>`;
  sorted.slice(0,15).forEach(([id,p])=>{const c=priCol[p.pri||3],l=priLbl[p.pri||3];const base=p.n.replace(/\s*\(.*\)/,'').toLowerCase();const isAccum=nameCount[base]>1;
  h+=`<div class="tl-item pri${p.pri||3}" onclick="editPri('${id}')"><div class="tl-dot" style="background:${c}"></div><div class="tl-body"><div class="tl-name">${p.n}${isAccum?' ⚠':''}</div><div class="tl-sub"><span class="pill" style="background:${c}18;color:${c}">${l}</span> ${p.vence||''}</div></div><div class="tl-amt" style="color:${c}">${fmt(p.m)}</div></div>`})
}
h+=`</div>`;
document.getElementById("s_dash").innerHTML=h;

// GASTOS
h=`<div class="seg"><button class="seg-btn ${gSeg==='fijos'?'active':''}" onclick="gSeg='fijos';render()">Fijos</button><button class="seg-btn ${gSeg==='variables'?'active':''}" onclick="gSeg='variables';render()">Variables</button><button class="seg-btn ${gSeg==='pendientes'?'active':''}" onclick="gSeg='pendientes';render()">Pendientes</button></div>`;
if(gSeg==='fijos'){
  h+=`<div class="grp">`;egs.forEach(([id,e])=>{h+=`<div class="row" onclick="editEg('${id}')"><div class="row-body"><div class="row-t">${e.n}</div><div class="row-s">${e.f}${e.mult?' x'+e.mult:''}</div></div><div class="row-r" style="color:var(--red)">${fmt(e.m)}</div><div style="color:var(--gray3)">›</div></div>`});
  h+=`<div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(255,59,48,.06)"><strong>Total</strong><strong style="color:var(--red)">${fmt(totalEg)}</strong></div></div>`;
  h+=`<div class="grp"><div style="display:flex;justify-content:space-between;padding:14px 16px"><span>Ingreso</span><strong style="color:var(--green)">${fmt(ing)}</strong></div><div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(0,122,255,.06);border-top:.5px solid var(--sep)"><strong>Balance</strong><strong style="font-size:20px;color:${ing-totalEg<0?'var(--red)':'var(--green)'}">${fmt(ing-totalEg)}</strong></div></div>`;
}else if(gSeg==='variables'){
  h+=`<button class="btn btn-blue" style="margin-bottom:14px" onclick="openGasto()">+ Registrar gasto</button>`;
  const gPC=CATS.map(c=>({name:c,total:gM.filter(([,g])=>g.cat===c).reduce((s,[,g])=>s+g.monto,0)})).filter(c=>c.total>0);
  if(gPC.length){const mx=Math.max(...gPC.map(c=>c.total));h+=`<div class="sT">Este mes: ${fmt(totalGM)}</div><div class="grp" style="padding:14px 16px">`;gPC.forEach((c,i)=>{h+=`<div class="bar-r"><div class="bar-l">${c.name}</div><div class="bar-t"><div class="bar-f" style="width:${Math.round(c.total/mx*100)}%;background:${COL[i%COL.length]}"></div></div><div class="bar-v">${fmt(c.total)}</div></div>`});h+=`</div>`}
  h+=`<div class="sT">Historial</div><div class="grp">`;
  if(!gastos.length)h+=`<div style="padding:20px;text-align:center;color:var(--text3)">Sin gastos</div>`;
  gastos.slice(0,30).forEach(([,g])=>{h+=`<div style="padding:12px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">${g.desc}</span><span style="font-weight:600;color:var(--red)">${fmt(g.monto)}</span></div><div style="display:flex;justify-content:space-between;margin-top:3px"><span class="pill" style="background:var(--blue);color:#fff">${g.cat}</span><span style="font-size:13px;color:var(--text3)">${g.fecha}</span></div></div>`});
  h+=`</div>`;
}else{
  const pends=Object.entries(D.pendientes||{});
  h+=`<div class="grp">`;pends.forEach(([id,p])=>{const r=p.min>0&&p.max>0?`${fmt(p.min)}-${fmt(p.max)}`:p.min>0?`~${fmt(p.min)}`:"Cotizar";h+=`<div class="row" onclick="D.pendientes['${id}'].done=!D.pendientes['${id}'].done;fb('PATCH','pendientes/${id}',{done:D.pendientes['${id}'].done});render()"><div class="chk ${p.done?'on':''}"></div><div class="row-body"><div class="row-t" style="${p.done?'text-decoration:line-through;color:var(--text3)':''}">${p.n}</div><div class="row-s">${p.det}</div></div><div class="row-r" style="color:var(--orange);font-size:14px">${r}</div></div>`});
  h+=`</div>`}
document.getElementById("s_gastos").innerHTML=h;

// DEUDAS
h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="grp" style="margin:0;padding:14px 16px"><div style="font-size:13px;color:var(--text3)">Deuda total</div><div style="font-size:22px;font-weight:700;color:var(--red)">${fmt(dCOP+dUSD*T)}</div></div><div class="grp" style="margin:0;padding:14px 16px"><div style="font-size:13px;color:var(--text3)">Ingreso mensual</div><div style="font-size:22px;font-weight:700;color:var(--green)">${fmt(ing)}</div></div></div>`;
["entidad","deel","persona"].forEach(cat=>{const items=deudas.filter(([,d])=>d.cat===cat);if(!items.length)return;h+=`<div class="sT">${cat==="entidad"?"Entidades":cat==="deel"?"Avances":"Personas"}</div><div class="grp">`;
items.forEach(([id,d])=>{const sv=d.saldo===null?"Sin confirmar":d.saldo===0?"Saldado ✓":d.usd?fmtU(d.saldo):fmt(d.saldo);const sc=d.saldo===0?"var(--green)":d.saldo===null?"var(--orange)":"var(--red)";const hk=d.hist?Object.keys(d.hist).sort().slice(-3):[];
h+=`<div style="padding:14px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-size:16px;font-weight:500">${d.n}</div><div style="font-size:16px;font-weight:600;color:${sc}">${sv}</div></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${d.cuota?`<span class="pill" style="background:var(--gray6);color:var(--text3)">${fmt(d.cuota)}/mes</span>`:''}${d.meses?`<span class="pill" style="background:rgba(0,122,255,.1);color:var(--blue)">${d.meses}m</span>`:''}</div>${hk.length?`<div style="font-size:12px;color:var(--text3);margin:4px 0">${hk.map(k=>`${k}: ${d.usd?fmtU(d.hist[k]):fmt(d.hist[k])}`).join(' → ')}</div>`:''}<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-gray" style="flex:1;padding:8px;font-size:14px" onclick="editDeuda('${id}')">Editar</button><button class="btn btn-blue" style="flex:1;padding:8px;font-size:14px" onclick="regSaldo('${id}')">Saldo mes</button></div></div>`});
h+=`</div>`});

// INVERSIONES
h=`<button class="btn btn-green" style="margin-bottom:14px" onclick="openInv()">+ Agregar</button><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="grp" style="margin:0;padding:14px 16px"><div style="font-size:13px;color:var(--text3)">Total COP</div><div style="font-size:22px;font-weight:700;color:var(--green)">${fmt(iCOP+iUSD*T)}</div></div><div class="grp" style="margin:0;padding:14px 16px"><div style="font-size:13px;color:var(--text3)">Total USD</div><div style="font-size:22px;font-weight:700;color:var(--green)">${iUSD?fmtU(iUSD):'$0'}</div></div></div><div class="grp">`;
if(!invs.length)h+=`<div style="padding:24px;text-align:center;color:var(--text3)">Agrega tu primera inversion</div>`;
invs.forEach(([,i])=>{h+=`<div class="row"><div class="row-body"><div class="row-t">${i.n}</div><div class="row-s">${i.det||i.moneda}</div></div><div class="row-r" style="color:var(--green)">${i.moneda==='USD'?fmtU(i.monto):fmt(i.monto)}</div></div>`});
h+=`</div>`;document.getElementById("s_inv").innerHTML=h;

// STATS
h=`<div class="sT">Gastos por categoria (mes)</div>`;
const gPC2=CATS.map(c=>({name:c,total:gM.filter(([,g])=>g.cat===c).reduce((s,[,g])=>s+g.monto,0)})).filter(c=>c.total>0);
if(gPC2.length){const mx=Math.max(...gPC2.map(c=>c.total));h+=`<div class="grp" style="padding:16px">`;gPC2.forEach((c,i)=>{h+=`<div class="bar-r"><div class="bar-l">${c.name}</div><div class="bar-t"><div class="bar-f" style="width:${Math.round(c.total/mx*100)}%;background:${COL[i%COL.length]}"></div></div><div class="bar-v">${fmt(c.total)}</div></div>`});h+=`</div>`}else h+=`<div class="grp" style="padding:20px;text-align:center;color:var(--text3)">Registra gastos para ver</div>`;
const mD=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");const tot=gastos.filter(([,g])=>g.fecha&&g.fecha.startsWith(k)).reduce((s,[,g])=>s+g.monto,0);mD.push({mes:MESES[d.getMonth()],total:tot})}
const mxM=Math.max(...mD.map(m=>m.total),1);
h+=`<div class="sT">Gastos por mes</div><div class="grp" style="padding:16px">`;mD.forEach((m,i)=>{h+=`<div class="bar-r"><div class="bar-l">${m.mes}</div><div class="bar-t"><div class="bar-f" style="width:${Math.round(m.total/mxM*100)}%;background:${COL[i%COL.length]}"></div></div><div class="bar-v">${fmt(m.total)}</div></div>`});h+=`</div>`;
h+=`<div class="sT">Resumen</div><div class="grp"><div class="row"><div class="row-body"><div class="row-t">Egresos fijos</div></div><div class="row-r" style="color:var(--red)">${fmt(totalEg)}</div></div><div class="row"><div class="row-body"><div class="row-t">Variables mes</div></div><div class="row-r" style="color:var(--orange)">${fmt(totalGM)}</div></div><div class="row"><div class="row-body"><div class="row-t">Ingreso</div></div><div class="row-r" style="color:var(--green)">${fmt(ing)}</div></div><div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(0,122,255,.06)"><strong>Balance real</strong><strong style="font-size:20px;color:${ing-totalEg-totalGM<0?'var(--red)':'var(--green)'}">${fmt(ing-totalEg-totalGM)}</strong></div></div>`;
h+=`<button class="btn btn-gray" onclick="location.reload()" style="margin-top:10px">Sincronizar</button>`;
document.getElementById("s_stats").innerHTML=h;
}
init();
</script>
</body>
</html>
