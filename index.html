<head>

<style>
:root{--blue:#007aff;--green:#4cd964;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;--purple:#5856d6;--teal:#34aadc;--yellow:#ffcc00;--gray:#8e8e93;--gray3:#c7c7cc;--gray5:#e5e5ea;--gray6:#f2f2f7;--bg:#f2f2f7;--card:#fff;--sep:rgba(60,60,67,.12);--text:#000;--text2:#3c3c43;--text3:#8e8e93;--safe-t:env(safe-area-inset-top,20px);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-bottom:calc(var(--safe-b)+70px);-webkit-font-smoothing:antialiased}
.header{padding:calc(var(--safe-t) + 8px) 16px 10px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:34px;font-weight:700;letter-spacing:-.5px}
.header button{font-size:17px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding:4px 0 calc(var(--safe-b)+4px);background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;font-size:10px;font-weight:500;color:var(--gray);cursor:pointer}.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:1px}
.cnt{padding:0 16px 20px}
.sec{display:none}.sec.active{display:block}
.sT{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:18px 0 6px}
.g{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 0 0 .5px var(--sep)}
.r{display:flex;align-items:center;gap:12px;padding:11px 16px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer}.r:last-child{border-bottom:none}.r:active{background:var(--gray6)}
.rb{flex:1;min-width:0}.rt{font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rs{font-size:13px;color:var(--text3);margin-top:1px}
.rv{font-size:16px;font-weight:500;flex-shrink:0}.pill{display:inline-block;font-size:12px;font-weight:500;padding:2px 8px;border-radius:10px}
.dc{padding:16px;cursor:pointer}
.dc-top{display:flex;justify-content:space-between;align-items:center}
.dc-lbl{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.dc-arr{font-size:20px;color:var(--gray3);transition:transform .2s}.dc-arr.open{transform:rotate(180deg)}
.dc-big{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:6px}
.dc-det{overflow:hidden;max-height:0;transition:max-height .3s}.dc-det.open{max-height:2000px}
.dc-row{display:flex;justify-content:space-between;padding:10px 0;border-top:.5px solid var(--sep);font-size:15px}
.tl{display:flex;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--sep);align-items:flex-start}.tl:last-child{border-bottom:none}
.tl.p0{background:rgba(255,45,85,.08);border-left:3px solid var(--pink)}.tl.p1{background:rgba(255,149,0,.06);border-left:3px solid var(--orange)}.tl.p2{border-left:3px solid var(--blue)}.tl.p3{border-left:3px solid var(--gray3)}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-b{flex:1;min-width:0}.tl-n{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-s{font-size:12px;color:var(--text3);margin-top:1px}.tl-a{font-size:15px;font-weight:600;flex-shrink:0}
.tl-warn{display:flex;gap:8px;padding:10px 16px;background:rgba(255,45,85,.1);font-size:13px;font-weight:500;color:var(--pink);border-bottom:.5px solid var(--sep)}
.seg{display:flex;background:rgba(142,142,147,.12);border-radius:8px;padding:2px;margin-bottom:14px}

input,select{width:100%;padding:11px 16px;font-size:16px;border:.5px solid var(--sep);background:var(--card);border-radius:10px;margin-bottom:8px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.btn{width:100%;padding:14px;font-size:17px;font-weight:600;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:8px}.btn:active{opacity:.8}
.btn-b{background:var(--blue)}.btn-g{background:var(--green)}.btn-o{background:var(--orange)}.btn-r{background:var(--red)}
.btn-l{background:rgba(142,142,147,.12);color:var(--blue)}
.r2{display:flex;gap:8px}.r2>*{flex:1}
.lb{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:4px;display:block}.fg{margin-bottom:12px}
.bar-r{display:flex;align-items:center;gap:6px;margin-bottom:7px}.bar-l{font-size:11px;color:var(--text3);width:68px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.sh{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding-bottom:calc(var(--safe-b)+20px);animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

.sh-b{padding:0 16px 16px}
.sync-t{width:100%;min-height:180px;font-size:11px;font-family:Menlo,monospace;padding:10px;background:var(--card);border:.5px solid var(--sep);border-radius:8px;color:var(--text);resize:none;margin-bottom:10px;line-height:1.4}
.toast{position:fixed;top:calc(var(--safe-t)+10px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;display:none}
.toast.show{display:block;animation:fio 2s ease}@keyframes fio{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

.mc-l{font-size:12px;color:var(--text3);margin-bottom:3px}.mc-v{font-size:22px;font-weight:700;letter-spacing:-.3px}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.act{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px 14px;border:none;font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;box-shadow:0 0 0 .5px var(--sep);text-align:left}.act:active{background:var(--gray6)}
.act-i{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;flex-shrink:0}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--sep:rgba(84,84,88,.65);--text:#fff;--text2:#ebebf5;--text3:#8e8e93;--gray5:#2c2c2e;--gray6:#1c1c1e}.tabbar{background:rgba(28,28,30,.88)}input,select{background:#2c2c2e;color:#fff;border-color:rgba(84,84,88,.4)}.seg{background:rgba(118,118,128,.24)}.seg button.a{background:#2c2c2e}}
</style>

<script>
const DB="https://finanzas-daniel-default-rtdb.firebaseio.com";
const f$=n=>"$"+Math.round(n).toLocaleString("es-CO");
const fU=n=>"$"+n.toLocaleString("en-US")+" USD";
const MS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CL=["#007aff","#5856d6","#34aadc","#ff9500","#ff2d55","#4cd964","#5ac8fa","#ffcc00","#ff3b30","#8e8e93"];
const priC=["#ff2d55","#ff9500","#007aff","#8e8e93"];
const priL=["Critico","Alto","Normal","Bajo"];

function diasInfo(vence){
  if(!vence)return{txt:'sin fecha',color:'var(--text3)'};
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const v=new Date(vence+'T00:00:00');
  const diff=Math.round((v-hoy)/(1000*60*60*24));
  if(diff<0)return{txt:`vencio hace ${Math.abs(diff)} dia${Math.abs(diff)>1?'s':''}`,color:'var(--red)'};
  if(diff===0)return{txt:'vence HOY',color:'var(--red)'};
  if(diff<=3)return{txt:`vence en ${diff} dia${diff>1?'s':''}`,color:'var(--orange)'};
  if(diff<=7)return{txt:`vence en ${diff} dias`,color:'var(--yellow)'};
  return{txt:`${vence}`,color:'var(--text3)'}
}
const MEDIOS=["Efectivo","TC Rappi","TC Bancolombia","TC Atl Nacional","Deel","Otro"];
const CATS=["Mercado","Alimentacion","Transporte","Salud","Entretenimiento","Hogar","Ropa","Educacion","Carro","Otro"];
const TIPOS=["Gasto recurrente","Gasto unico","Imprevisto","Manutencion diaria","Ya pagado","Por pagar"];
let D=null,cTab="dash",gSeg="fijos";

async function fb(m,p,d){try{const o={method:m,headers:{"Content-Type":"application/json"}};if(d)o.body=JSON.stringify(d);const r=await fetch(DB+"/"+p+".json",o);return r.json()}catch{return null}}
function cls(){document.getElementById("shModal").classList.remove("open")}
function modal(t,html){document.getElementById("shTitle").textContent=t;document.getElementById("shBody").innerHTML=html;document.getElementById("shModal").classList.add("open")}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.remove("show");void t.offsetWidth;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
function go(t){cTab=t;document.querySelectorAll(".tab").forEach((e,i)=>e.classList.toggle("active",["dash","gastos","deudas","inv","stats"][i]===t));render();window.scrollTo(0,0)}

const SEED={
config:{tasa:3764,ingUSD:1311,deelUSD:1229,deelRec:"Q5"},
subcats:{s1:{n:"Mercado"},s2:{n:"Restaurante"},s3:{n:"Gasolina"},s4:{n:"Uber"},s5:{n:"Almuerzo oficina"},s6:{n:"Mant. carro"},s7:{n:"Farmacia"},s8:{n:"Snacks/cafe"}},
pagos:{q4_12:{n:"EPM cuota vencida",m:372500,tp:"cash",ej:false,pri:2,vence:"2025-05-16"},q4_13:{n:"Arriendo mayo",m:2338905,tp:"rappi",ej:false,pri:1,vence:"2025-05-15"},q5_3:{n:"Manutencion hijos",m:680000,tp:"cash",ej:false,pri:0,vence:"2025-05-30"},q5_4:{n:"Servicios EPM",m:400000,tp:"cash",ej:false,pri:2,vence:"2025-05-30"},q5_5:{n:"Internet Claro",m:375000,tp:"cash",ej:false,pri:2,vence:"2025-05-30"},q5_6:{n:"Itau unificado",m:523000,tp:"cash",ej:false,pri:1,vence:"2025-06-05"},q5_7:{n:"TC Rappi cuota",m:500000,tp:"cash",ej:false,pri:1,vence:"2025-05-30"},q5_ar:{n:"Arriendo junio",m:2338905,tp:"rappi",ej:false,pri:1,vence:"2025-06-01"},q6_1:{n:"Credito carro",m:1900000,tp:"cash",ej:false,pri:1,vence:"2025-06-15"},q6_2:{n:"Manutencion hijos",m:680000,tp:"cash",ej:false,pri:0,vence:"2025-06-15"},q6_3:{n:"Credito papa",m:280000,tp:"cash",ej:false,pri:2,vence:"2025-06-15"},q6_4:{n:"TC Bancolombia",m:190000,tp:"cash",ej:false,pri:2,vence:"2025-06-16"},q6_5:{n:"TC Atletico Nal",m:42000,tp:"cash",ej:false,pri:3,vence:"2025-06-20"},q6_6:{n:"Itau unificado",m:523000,tp:"cash",ej:false,pri:1,vence:"2025-07-05"},q6_7:{n:"TC Rappi cuota",m:500000,tp:"cash",ej:false,pri:1,vence:"2025-06-15"},q6_8:{n:"Claude Pro",m:72000,tp:"cash",ej:false,pri:3,vence:"2025-06-01"}},
deudas:{d1:{n:"Itau unificado",saldo:null,cuota:523000,meses:84,det:"1er pago 5 jun",conf:false,cat:"entidad",hist:{}},d2:{n:"TC Rappi plan",saldo:null,cuota:500000,meses:12,det:"Activado mayo",conf:false,cat:"entidad",hist:{}},d3:{n:"Credito carro Finandina",saldo:null,cuota:1900000,det:"Saldo por consultar",conf:false,cat:"entidad",hist:{}},d4:{n:"TC Bancolombia",saldo:2144372,cuota:190000,det:"+ $67 USD",conf:true,cat:"entidad",hist:{}},d5:{n:"TC Atletico Nal",saldo:360672,cuota:42000,det:"Cancelada",conf:false,cat:"entidad",hist:{}},d6:{n:"Credito papa",saldo:null,cuota:280000,det:"Por confirmar",conf:false,cat:"entidad",hist:{}},d7:{n:"EPM atrasos",saldo:287500,det:"Resto factura",conf:true,cat:"entidad",hist:{}},d8:{n:"Avance Deel",saldo:1229,det:"Recobro 30 may",conf:true,cat:"deel",usd:true,hist:{}},d9:{n:"Simon",saldo:0,det:"Saldado",conf:true,cat:"persona",hist:{}},d10:{n:"Mama",saldo:0,det:"Saldada",conf:true,cat:"persona",hist:{}}},
egresos:{e1:{n:"Arriendo",m:2338905,f:"Mensual",hist:{}},e2:{n:"Credito carro",m:1900000,f:"Mensual",hist:{}},e3:{n:"Manutencion hijos",m:680000,f:"Quincenal",mult:2,hist:{}},e4:{n:"Itau unificado",m:523000,f:"Desde junio",hist:{}},e5:{n:"TC Rappi",m:500000,f:"Plan 12m",hist:{}},e6:{n:"Internet Claro",m:375000,f:"Mensual",hist:{}},e7:{n:"EPM",m:400000,f:"Mensual",hist:{}},e8:{n:"Credito papa",m:280000,f:"Mensual",hist:{}},e9:{n:"TC Bancolombia",m:190000,f:"Mensual",hist:{}},e10:{n:"Claude Pro",m:72000,f:"$20 USD",hist:{}},e11:{n:"TC Atletico Nal",m:42000,f:"Mensual",hist:{}}},
inversiones:{},gastos:{},ingresos:{},
pendientes:{p1:{n:"Display Samsung",det:"$500k-$700k",min:500000,max:700000,fechaMax:"2025-06-30",done:false,prescindible:true},p2:{n:"Rayon bumper",det:"Cotizar",min:0,max:0,fechaMax:"2025-06-30",done:false,prescindible:true},p3:{n:"Impuesto vehicular",det:"JKM492",min:0,max:0,fechaMax:"2025-07-21",done:false,prescindible:false},p4:{n:"Tiquetes hijos",det:"3+1 vuelos ~$10M",min:9000000,max:11000000,fechaMax:"2025-07-01",done:false,prescindible:false}}
};

async function init(){D=await fb("GET","");if(!D||!D.config){await fb("PUT","",SEED);D=SEED}["gastos","inversiones","pendientes","deudas","pagos","egresos","ingresos","subcats"].forEach(k=>{if(!D[k])D[k]={}});render()}

// --- HELPERS ---
function oe(o){return o?Object.entries(o):[]}
function T(){return D.config?.tasa||3764}
function subcatOpts(){return oe(D.subcats).map(([,s])=>s.n)}
function autoPri(pagos){
  // Count names for accumulation detection
  const nc={};pagos.filter(([,p])=>!p.ej).forEach(([,p])=>{const b=p.n.replace(/\s*\(.*\)/,'').toLowerCase().trim();nc[b]=(nc[b]||0)+1});
  pagos.forEach(([id,p])=>{
    if(p.ej)return;
    const b=p.n.replace(/\s*\(.*\)/,'').toLowerCase().trim();
    if(b.includes("manutencion")||b.includes("manutención"))p.pri=0;
    else if(nc[b]>1&&p.pri>0)p.pri=0;
  });
  return Object.keys(nc).filter(k=>nc[k]>1);
}

// --- SYNC ---
function openSync(){
  const p=oe(D.pagos),d=oe(D.deudas),g=oe(D.gastos).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)),e=oe(D.egresos),inv=oe(D.inversiones),ing=oe(D.ingresos).sort((a,b)=>(b[1].fecha||'').localeCompare(a[1].fecha||''));
  const tE=e.reduce((s,[,x])=>s+x.m*(x.mult||1),0),iM=(D.config?.ingUSD||1311)*2*T();
  const now=new Date(),gM=g.filter(([,x])=>{const d=new Date(x.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  let t=`SYNC FINANZAS - ${now.toLocaleDateString('es-CO')}\nTasa:$${T()} | Ingreso:$${D.config?.ingUSD}USD/q | Deel:$${D.config?.deelUSD||0}USD\n\n`;
  t+=`== PAGOS PENDIENTES ==\n`;const pend=p.filter(([,x])=>!x.ej).sort((a,b)=>(a[1].pri||3)-(b[1].pri||3));
  pend.forEach(([,x])=>{t+=`[${priL[x.pri||3]}] ${x.n}: ${f$(x.m)} | ${x.vence||''} | medio:${x.medio||'sin asignar'}\n`});
  t+=`\n== DEUDAS ==\n`;d.forEach(([,x])=>{const sv=x.saldo===null?"NO CONFIRMADO":x.saldo===0?"SALDADO":x.usd?`$${x.saldo}USD`:f$(x.saldo);t+=`${x.n}: ${sv}${x.cuota?' | '+f$(x.cuota)+'/mes':''}${x.meses?' | '+x.meses+'m':''}\n`;if(x.hist){const hk=Object.keys(x.hist).sort().slice(-3);if(hk.length)t+=`  Hist: ${hk.map(k=>k+':'+(x.usd?fU(x.hist[k]):f$(x.hist[k]))).join(', ')}\n`}});
  if(inv.length){t+=`\n== INVERSIONES ==\n`;inv.forEach(([,x])=>{const rend=x.rend?Object.values(x.rend).reduce((s,v)=>s+v,0):0;const ret=x.retiros?Object.values(x.retiros).reduce((s,v)=>s+v,0):0;const cap=x.monto+rend-ret;t+=`${x.n}: ${x.moneda==='USD'?fU(cap):f$(cap)} (inv:${x.moneda==='USD'?fU(x.monto):f$(x.monto)} rend:${f$(rend)} ret:${f$(ret)}) ${x.activa===false?'[VENDIDA]':''}\n`})}
  t+=`\n== GASTOS MES: ${f$(gM.reduce((s,[,x])=>s+x.monto,0))} ==\n`;const pc={};gM.forEach(([,x])=>{const k=x.subcat||x.cat||'Otro';pc[k]=(pc[k]||0)+x.monto});Object.entries(pc).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>t+=`  ${c}: ${f$(v)}\n`);
  if(ing.length){t+=`\n== INGRESOS RECIENTES ==\n`;ing.slice(0,6).forEach(([,x])=>t+=`  ${x.fecha}: $${x.montoUSD||0}USD @${x.tasa} = ${f$(x.montoCOP||0)}${x.avanceDeel?' | Deel:$'+x.avanceDeel+'USD':''}\n`)}
  t+=`\n== FLUJO ==\nEgresos fijos: ${f$(tE)}\nIngreso: ${f$(iM)}\nBalance: ${f$(iM-tE)}\n`;
  const pn=oe(D.pendientes).filter(([,x])=>!x.done);if(pn.length){t+=`\n== PENDIENTES ==\n`;pn.forEach(([,x])=>t+=`${x.prescindible?'[PRESCINDIBLE]':'[NECESARIO]'} ${x.n}: ${x.det} | max:${x.fechaMax||'sin fecha'}\n`)}
  modal("Sync con Claude",`<p style="font-size:14px;color:var(--text3);margin-bottom:8px">Copia y pega en Claude.</p><textarea class="sync-t" id="syncT" readonly>${t}</textarea><button class="btn btn-g" onclick="navigator.clipboard.writeText(document.getElementById('syncT').value).then(()=>toast('✓ Copiado'))">Copiar</button>`);
}

async function savePend(id){
  const n=document.getElementById("peN").value,det=document.getElementById("peD").value,min=parseInt(document.getElementById("peMin").value)||0,max=parseInt(document.getElementById("peMax").value)||0,fechaMax=document.getElementById("peF").value,prescindible=document.getElementById("pePr").checked,done=document.getElementById("peDn").checked,subcat=document.getElementById("peSub").value||null;
  Object.assign(D.pendientes[id],{n,det,min,max,fechaMax,prescindible,done,subcat});await sv("pendientes/"+id,D.pendientes[id]);cls();toast("Actualizado");render()}

function mgrSubcats(){
  const sc=oe(D.subcats);
  modal("Subcategorias",`
<div class="g">${sc.length?sc.map(([id,s])=>`<div class="r"><div class="rb"><div class="rt">${s.n}</div></div><button style="color:var(--red);background:none;border:none;font-size:15px;cursor:pointer" onclick="delSubcat('${id}')">Eliminar</button></div>`).join(''):'<div style="padding:16px;text-align:center;color:var(--text3)">Sin subcategorias</div>'}</div>
<div class="fg"><label class="lb">Nueva subcategoria</label><input id="scN" placeholder="Ej: Almuerzo oficina" /></div>
<button class="btn btn-b" onclick="addSubcat()">Agregar</button>`)}

async function addSubcat(){const n=document.getElementById("scN").value;if(!n)return;const id="sc_"+Date.now();D.subcats[id]={n};await sv("subcats/"+id,{n});mgrSubcats();toast("Agregada")}
async function delSubcat(id){delete D.subcats[id];await fb("DELETE","subcats/"+id);mgrSubcats();toast("Eliminada")}

function editConfig(){
  modal("Configuracion",`
<div class="fg"><label class="lb">Tasa COP/USD</label><input id="ecT" type="number" value="${T()}" /></div>
<div class="r2"><div class="fg"><label class="lb">Ingreso quincenal USD</label><input id="ecI" type="number" value="${D.config?.ingUSD||1311}" /></div>
<div class="fg"><label class="lb">Avance Deel USD</label><input id="ecD" type="number" value="${D.config?.deelUSD||0}" /></div></div>
<button class="btn btn-b" onclick="saveConfig()">Guardar</button>`)}

async function saveConfig(){
  const tasa=parseInt(document.getElementById("ecT").value)||3764,ingUSD=parseInt(document.getElementById("ecI").value)||1311,deelUSD=parseInt(document.getElementById("ecD").value)||0;
  Object.assign(D.config,{tasa,ingUSD,deelUSD});await sv("config",{tasa,ingUSD,deelUSD});cls();toast("Guardado");render()}

// ===================== RENDER =====================
function render(){
if(!D)return;
const pagos=oe(D.pagos),deudas=oe(D.deudas),gastos=oe(D.gastos).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)),egs=oe(D.egresos),invs=oe(D.inversiones),pends=oe(D.pendientes),ings=oe(D.ingresos).sort((a,b)=>(b[1].fecha||'').localeCompare(a[1].fecha||''));
const tE=egs.reduce((s,[,e])=>s+e.m*(e.mult||1),0),iM=(D.config?.ingUSD||1311)*2*T();
const now=new Date(),gM=gastos.filter(([,x])=>{const d=new Date(x.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}),tGM=gM.reduce((s,[,x])=>s+x.monto,0);
let dCOP=0,dUSD=0;deudas.forEach(([,d])=>{if(d.saldo>0){if(d.usd)dUSD+=d.saldo;else dCOP+=d.saldo}});
let iCOP=0,iUSD=0;invs.forEach(([,i])=>{if(i.activa!==false){const r=i.rend?Object.values(i.rend).reduce((s,v)=>s+v,0):0;const rt=i.retiros?Object.values(i.retiros).reduce((s,v)=>s+v,0):0;const cap=i.monto+r-rt;if(i.moneda==='USD')iUSD+=cap;else iCOP+=cap}});
const pending=pagos.filter(([,p])=>!p.ej).sort((a,b)=>(a[1].vence||'z').localeCompare(b[1].vence||'z'));
const accum=autoPri(pagos);

// Next quincena (next 15 days)
const in15=new Date();in15.setDate(in15.getDate()+15);const nxt15=pending.filter(([,p])=>{if(!p.vence)return false;const d=new Date(p.vence);return d<=in15});
const nxt15Total=nxt15.reduce((s,[,p])=>s+p.m,0);

let h='';
const tabs={dash:'Finanzas',gastos:'Gastos',deudas:'Deudas',inv:'Inversiones',stats:'Análisis'};

// ===== DASHBOARD =====
if(cTab==='dash'){
h+=`<div class="header"><h1>${tabs.dash}</h1><button onclick="openSync()">Sync</button></div><div class="cnt">`;

// Deuda COP + USD equal weight
h+=`<div class="m2"><div class="mc"><div class="mc-l">Deuda en pesos</div><div class="mc-v" style="color:var(--red)">${f$(dCOP)}</div></div><div class="mc"><div class="mc-l">Deuda en dolares</div><div class="mc-v" style="color:var(--red)">${dUSD?fU(dUSD):'$0 USD'}</div></div></div>`;

// Deuda detail dropdown
h+=`<div class="g"><div class="dc" onclick="this.querySelector('.dc-det').classList.toggle('open');this.querySelector('.dc-arr').classList.toggle('open')"><div class="dc-top"><div class="dc-lbl">Deuda total</div><div class="dc-arr">⌄</div></div><div class="dc-big" style="color:var(--red)">${f$(dCOP+dUSD*T())}</div><div class="dc-det">`;
deudas.filter(([,d])=>d.saldo>0||d.saldo===null).forEach(([,d])=>{const sv=d.saldo===null?'Sin confirmar':d.usd?fU(d.saldo):f$(d.saldo);const sc=d.saldo===null?'var(--orange)':'var(--red)';h+=`<div class="dc-row"><span>${d.n}</span><span style="font-weight:600;color:${sc}">${sv}</span></div>`});
h+=`</div></div></div>`;

// Inversiones dropdown
h+=`<div class="g"><div class="dc" onclick="this.querySelector('.dc-det').classList.toggle('open');this.querySelector('.dc-arr').classList.toggle('open')"><div class="dc-top"><div class="dc-lbl">Inversiones / Ahorros</div><div class="dc-arr">⌄</div></div><div class="dc-big" style="color:var(--green)">${iCOP||iUSD?f$(iCOP+iUSD*T()):'$0'}</div><div class="dc-det">`;

h+=`</div></div></div>`;

// Config card
h+=`<div class="g" style="cursor:pointer" onclick="editConfig()"><div style="display:flex;justify-content:space-between;padding:12px 16px"><div><div style="font-size:12px;color:var(--text3)">Tasa</div><div style="font-size:20px;font-weight:700">$${T()}</div></div><div style="text-align:right"><div style="font-size:12px;color:var(--text3)">Deel activo</div><div style="font-size:18px;font-weight:600;color:var(--orange)">${fU(D.config?.deelUSD||0)}</div></div></div></div>`;

// Next quincena planning
h+=`<div class="sT">Proxima quincena (15 dias)</div><div class="g"><div style="display:flex;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--sep)"><span style="font-weight:500">${nxt15.length} pagos</span><span style="font-weight:700;color:var(--red)">${f$(nxt15Total)}</span></div>`;
nxt15.slice(0,8).forEach(([id,p])=>{const c=priC[p.pri||3];const di=diasInfo(p.vence);h+=`<div class="tl p${p.pri||3}" onclick="editPago('${id}')"><div class="tl-dot" style="background:${c}"></div><div class="tl-b"><div class="tl-n">${p.n}</div><div class="tl-s"><span style="font-weight:600;color:${di.color}">${di.txt}</span> ${p.medio?'· '+p.medio:''}</div></div><div class="tl-a" style="color:${c}">${f$(p.m)}</div></div>`});

pending.sort((a,b)=>(a[1].pri||3)-(b[1].pri||3)).forEach(([id,p])=>{const c=priC[p.pri||3];const di=diasInfo(p.vence);h+=`<div class="tl p${p.pri||3}" onclick="editPago('${id}')"><div class="tl-dot" style="background:${c}"></div><div class="tl-b"><div class="tl-n">${p.n}${accum.includes(p.n.replace(/\s*\(.*\)/,'').toLowerCase().trim())?' ⚠':''}</div><div class="tl-s"><span class="pill" style="background:${c}18;color:${c}">${priL[p.pri||3]}</span> <span style="font-weight:500;color:${di.color}">${di.txt}</span> ${p.medio?'· '+p.medio:''}</div></div><div class="tl-a" style="color:${c}">${f$(p.m)}</div></div>`});
if(!pending.length)h+=`<div style="padding:20px;text-align:center;color:var(--text3)">Todo al dia ✓</div>`;
h+=`</div>`;

// Pendientes in timeline
const pendAct=pends.filter(([,p])=>!p.done);
if(pendAct.length){h+=`<div class="sT">Pendientes</div><div class="g">`;
pendAct.forEach(([id,p])=>{const di=diasInfo(p.fechaMax);h+=`<div class="tl p3" onclick="editPend('${id}')"><div class="tl-dot" style="background:${p.prescindible?'var(--gray3)':'var(--orange)'}"></div><div class="tl-b"><div class="tl-n">${p.n}</div><div class="tl-s">${p.prescindible?'Prescindible':'Necesario'} · <span style="font-weight:500;color:${di.color}">${di.txt}</span></div></div><div class="tl-a" style="color:var(--orange);font-size:13px">${p.min?f$(p.min):''}</div></div>`});
h+=`</div>`}
h+=`<button class="btn btn-l" onclick="regIngreso()">Registrar ingreso quincena</button>`;
h+=`</div>`;}

// ===== GASTOS =====
if(cTab==='gastos'){
h+=`<div class="header"><h1>${tabs.gastos}</h1></div><div class="cnt">`;
h+=`<div class="acts"><button class="act" onclick="addGasto()"><div class="act-i" style="background:var(--blue)">+</div><div>Gasto</div></button><button class="act" onclick="mgrSubcats()"><div class="act-i" style="background:var(--purple)">⚙</div><div>Subcategorias</div></button></div>`;
h+=`<div class="seg"><button class="${gSeg==='fijos'?'a':''}" onclick="gSeg='fijos';render()">Fijos</button><button class="${gSeg==='variables'?'a':''}" onclick="gSeg='variables';render()">Variables</button><button class="${gSeg==='pendientes'?'a':''}" onclick="gSeg='pendientes';render()">Pendientes</button></div>`;
if(gSeg==='fijos'){
  h+=`<div class="g">`;egs.forEach(([id,e])=>{h+=`<div class="r" onclick="editEgreso('${id}')"><div class="rb"><div class="rt">${e.n}</div><div class="rs">${e.f}${e.mult?' x'+e.mult:''}${e.diaCobro?' · dia '+e.diaCobro:''}${e.subcat?' · '+e.subcat:''}</div></div><div class="rv" style="color:var(--red)">${f$(e.m)}</div><div style="color:var(--gray3)">›</div></div>`});
  h+=`<div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(255,59,48,.06)"><strong>Total</strong><strong style="color:var(--red)">${f$(tE)}</strong></div></div>`;
  h+=`<div class="g"><div style="display:flex;justify-content:space-between;padding:12px 16px"><span>Ingreso</span><strong style="color:var(--green)">${f$(iM)}</strong></div><div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(0,122,255,.06);border-top:.5px solid var(--sep)"><strong>Balance</strong><strong style="font-size:20px;color:${iM-tE<0?'var(--red)':'var(--green)'}">${f$(iM-tE)}</strong></div></div>`;
}else if(gSeg==='variables'){
  const gPC=CATS.map(c=>({name:c,total:gM.filter(([,x])=>x.cat===c).reduce((s,[,x])=>s+x.monto,0)})).filter(c=>c.total>0);
  if(gPC.length){const mx=Math.max(...gPC.map(c=>c.total));h+=`<div class="sT">Este mes: ${f$(tGM)}</div><div class="g" style="padding:12px 16px">`;gPC.forEach((c,i)=>{h+=`<div class="bar-r"><div class="bar-l">${c.name}</div><div class="bar-t"><div class="bar-f" style="width:${Math.round(c.total/mx*100)}%;background:${CL[i%CL.length]}"></div></div><div class="bar-v">${f$(c.total)}</div></div>`});h+=`</div>`}
  h+=`<div class="sT">Historial</div><div class="g">`;
  if(!gastos.length)h+=`<div style="padding:20px;text-align:center;color:var(--text3)">Sin gastos</div>`;
  gastos.slice(0,30).forEach(([,g])=>{h+=`<div style="padding:10px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">${g.desc}</span><span style="font-weight:600;color:var(--red)">${f$(g.monto)}</span></div><div style="display:flex;justify-content:space-between;margin-top:3px;flex-wrap:wrap;gap:4px"><div><span class="pill" style="background:var(--blue);color:#fff">${g.cat}</span>${g.subcat?`<span class="pill" style="background:var(--purple);color:#fff">${g.subcat}</span>`:''}</div><span style="font-size:12px;color:var(--text3)">${g.fecha} · ${g.medio||''}</span></div></div>`});
  h+=`</div>`;

  h+=`</div>`}
h+=`</div>`;}

// ===== DEUDAS =====
if(cTab==='deudas'){
h+=`<div class="header"><h1>${tabs.deudas}</h1></div><div class="cnt">`;
h+=`<button class="btn btn-b" style="margin-bottom:14px" onclick="addDeuda()">+ Agregar deuda</button>`;
h+=`<div class="m2"><div class="mc"><div class="mc-l">Deuda COP</div><div class="mc-v" style="color:var(--red)">${f$(dCOP)}</div></div><div class="mc"><div class="mc-l">Deuda USD</div><div class="mc-v" style="color:var(--red)">${dUSD?fU(dUSD):'$0'}</div></div></div>`;
["entidad","deel","persona"].forEach(cat=>{const items=deudas.filter(([,d])=>d.cat===cat);if(!items.length)return;h+=`<div class="sT">${cat==="entidad"?"Entidades":cat==="deel"?"Avances":"Personas"}</div><div class="g">`;
items.forEach(([id,d])=>{const sv=d.saldo===null?"Sin confirmar":d.saldo===0?"Saldado ✓":d.usd?fU(d.saldo):f$(d.saldo);const sc=d.saldo===0?"var(--green)":d.saldo===null?"var(--orange)":"var(--red)";const hk=d.hist?Object.keys(d.hist).sort().slice(-3):[];
h+=`<div style="padding:12px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:500">${d.n}</div><div style="font-weight:600;color:${sc}">${sv}</div></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">${d.cuota?`<span class="pill" style="background:var(--gray6);color:var(--text3)">${f$(d.cuota)}/mes</span>`:''}${d.meses?`<span class="pill" style="background:rgba(0,122,255,.1);color:var(--blue)">${d.meses}m</span>`:''}</div>${hk.length?`<div style="font-size:12px;color:var(--text3);margin-bottom:4px">${hk.map(k=>`${k}: ${d.usd?fU(d.hist[k]):f$(d.hist[k])}`).join(' → ')}</div>`:''}<div style="display:flex;gap:8px"><button class="btn btn-l" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="editDeuda('${id}')">Editar</button><button class="btn btn-b" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="regSaldo('${id}')">Saldo mes</button></div></div>`});

h+=`</div>`;}

if(cTab==='inv'){

// Gastos por mes

if(ings.length){
h+=`<div class="sT">Ingresos recibidos</div><div class="g">`;
ings.slice(0,10).forEach(([,ig])=>{h+=`<div style="padding:10px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">${ig.fecha}</span><span style="font-weight:600;color:var(--green)">${f$(ig.montoCOP||0)}</span></div><div style="font-size:12px;color:var(--text3);margin-top:2px">$${ig.montoUSD||0} USD @ $${ig.tasa}${ig.avanceDeel?' · Deel: $'+ig.avanceDeel+'USD':''}${ig.recobro?' · Rec: $'+ig.recobro+'USD':''}</div></div>`});
h+=`</div>`;
const ingD=ings.slice(0,12).reverse();if(ingD.length>1){const mxI=Math.max(...ingD.map(([,x])=>x.montoCOP||0));h+=`<div class="sT">Ingreso en pesos</div><div class="g" style="padding:12px 16px">`;ingD.forEach(([,x],i)=>{h+=`<div class="bar-r"><div class="bar-l">${x.fecha?.slice(5)||''}</div><div class="bar-t"><div class="bar-f" style="width:${Math.round((x.montoCOP||0)/mxI*100)}%;background:var(--green)"></div></div><div class="bar-v">${f$(x.montoCOP||0)}</div></div>`});h+=`</div>`}}

// Resumen
h+=`<div class="sT">Resumen</div><div class="g"><div class="r"><div class="rb"><div class="rt">Egresos fijos</div></div><div class="rv" style="color:var(--red)">${f$(tE)}</div></div><div class="r"><div class="rb"><div class="rt">Variables mes</div></div><div class="rv" style="color:var(--orange)">${f$(tGM)}</div></div><div class="r"><div class="rb"><div class="rt">Ingreso</div></div><div class="rv" style="color:var(--green)">${f$(iM)}</div></div><div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(0,122,255,.06)"><strong>Balance real</strong><strong style="font-size:20px;color:${iM-tE-tGM<0?'var(--red)':'var(--green)'}">${f$(iM-tE-tGM)}</strong></div></div>`;
h+=`<button class="btn btn-l" onclick="location.reload()">Sincronizar</button>`;
h+=`</div>`;}

document.getElementById("app").innerHTML=h;
}

init();
</script>
</body>
</html>
