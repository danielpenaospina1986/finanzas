<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
:root{--blue:#007aff;--green:#4cd964;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;--purple:#5856d6;--teal:#34aadc;--yellow:#ffcc00;--gray:#8e8e93;--gray3:#c7c7cc;--gray5:#e5e5ea;--gray6:#f2f2f7;--bg:#f2f2f7;--card:#fff;--sep:rgba(60,60,67,.12);--text:#000;--text2:#3c3c43;--text3:#8e8e93;--safe-t:env(safe-area-inset-top,20px);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-bottom:calc(var(--safe-b)+70px);-webkit-font-smoothing:antialiased}
.header{padding:calc(var(--safe-t)+8px) 16px 10px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:34px;font-weight:700;letter-spacing:-.5px}
.header button{font-size:17px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding:4px 0 calc(var(--safe-b)+4px);background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;font-size:10px;font-weight:500;color:var(--gray);cursor:pointer}.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:1px}
.cnt{padding:0 16px 20px}
.sec{display:none}.sec.active{display:block}
.sT{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:18px 0 6px}
.g{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 0 0 .5px var(--sep)}
.r{display:flex;align-items:center;gap:12px;padding:11px 16px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer}.r:last-child{border-bottom:none}.r:active{background:var(--gray6)}
.rb{flex:1;min-width:0}.rt{font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rs{font-size:13px;color:var(--text3);margin-top:1px}
.rv{font-size:16px;font-weight:500;flex-shrink:0}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:2px 8px;border-radius:10px}
.dc{padding:16px;cursor:pointer}
.dc-top{display:flex;justify-content:space-between;align-items:center}
.dc-lbl{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.dc-arr{font-size:20px;color:var(--gray3);transition:transform .2s}.dc-arr.open{transform:rotate(180deg)}
.dc-big{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:6px}
.dc-det{overflow:hidden;max-height:0;transition:max-height .3s}.dc-det.open{max-height:2000px}
.dc-row{display:flex;justify-content:space-between;padding:10px 0;border-top:.5px solid var(--sep);font-size:15px}
.tl{display:flex;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--sep);align-items:flex-start}.tl:last-child{border-bottom:none}
.tl.p0{background:rgba(255,45,85,.08);border-left:3px solid var(--pink)}.tl.p1{background:rgba(255,149,0,.06);border-left:3px solid var(--orange)}.tl.p2{border-left:3px solid var(--blue)}.tl.p3{border-left:3px solid var(--gray3)}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-b{flex:1;min-width:0}.tl-n{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-s{font-size:12px;color:var(--text3);margin-top:1px}.tl-a{font-size:15px;font-weight:600;flex-shrink:0}
.tl-warn{display:flex;gap:8px;padding:10px 16px;background:rgba(255,45,85,.1);font-size:13px;font-weight:500;color:var(--pink);border-bottom:.5px solid var(--sep)}
.seg{display:flex;background:rgba(142,142,147,.12);border-radius:8px;padding:2px;margin-bottom:14px}
.seg button{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text3);border-radius:7px;cursor:pointer;font-family:inherit}
.seg button.a{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
input,select{width:100%;padding:11px 16px;font-size:16px;border:.5px solid var(--sep);background:var(--card);border-radius:10px;margin-bottom:8px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.btn{width:100%;padding:14px;font-size:17px;font-weight:600;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:8px}.btn:active{opacity:.8}
.btn-b{background:var(--blue)}.btn-g{background:var(--green)}.btn-o{background:var(--orange)}.btn-r{background:var(--red)}.btn-l{background:rgba(142,142,147,.12);color:var(--blue)}
.r2{display:flex;gap:8px}.r2>*{flex:1}
.lb{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:4px;display:block}.fg{margin-bottom:12px}
.bar-r{display:flex;align-items:center;gap:6px;margin-bottom:7px}.bar-l{font-size:11px;color:var(--text3);width:68px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-t{flex:1;height:20px;background:var(--gray6);border-radius:5px;overflow:hidden}.bar-f{height:100%;border-radius:5px;min-width:2px}
.bar-v{font-size:11px;font-weight:600;width:68px;flex-shrink:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}.ov.open{display:flex}
.sh{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding-bottom:calc(var(--safe-b)+20px);animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-h{width:36px;height:5px;border-radius:3px;background:var(--gray3);margin:8px auto 4px}
.sh-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.sh-t{font-size:17px;font-weight:600}.sh-x{font-size:17px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.sh-b{padding:0 16px 16px}
.sync-t{width:100%;min-height:180px;font-size:11px;font-family:Menlo,monospace;padding:10px;background:var(--card);border:.5px solid var(--sep);border-radius:8px;color:var(--text);resize:none;margin-bottom:10px;line-height:1.4}
.toast{position:fixed;top:calc(var(--safe-t)+10px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;display:none}
.toast.show{display:block;animation:fio 2s ease}@keyframes fio{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mc{background:var(--card);border-radius:12px;padding:14px 16px;box-shadow:0 0 0 .5px var(--sep)}
.mc-l{font-size:12px;color:var(--text3);margin-bottom:3px}.mc-v{font-size:22px;font-weight:700;letter-spacing:-.3px}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.act{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px 14px;border:none;font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;box-shadow:0 0 0 .5px var(--sep);text-align:left}.act:active{background:var(--gray6)}
.act-i{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;flex-shrink:0}
.chart-wrap{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 0 0 .5px var(--sep);overflow-x:auto}
.proj-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:.5px solid var(--sep);font-size:14px}.proj-row:last-child{border-bottom:none}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--sep:rgba(84,84,88,.65);--text:#fff;--text2:#ebebf5;--text3:#8e8e93;--gray5:#2c2c2e;--gray6:#1c1c1e}.tabbar{background:rgba(28,28,30,.88)}input,select{background:#2c2c2e;color:#fff;border-color:rgba(84,84,88,.4)}.seg{background:rgba(118,118,128,.24)}.seg button.a{background:#2c2c2e}}
</style>
</head>
<body>
<div id="app"></div>
<div class="tabbar">
<div class="tab active" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 13h6a1 1 0 001-1V4a1 1 0 00-1-1H4a1 1 0 00-1 1v8a1 1 0 001 1zm0 8h6a1 1 0 001-1v-4a1 1 0 00-1-1H4a1 1 0 00-1 1v4a1 1 0 001 1zm10 0h6a1 1 0 001-1v-8a1 1 0 00-1-1h-6a1 1 0 00-1 1v8a1 1 0 001 1zm0-18v4a1 1 0 001 1h6a1 1 0 001-1V3a1 1 0 00-1-1h-6a1 1 0 00-1 1z"/></svg><span>Inicio</span></div>
<div class="tab" onclick="go('gastos')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>Gastos</span></div>
<div class="tab" onclick="go('deudas')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 14H4V6h16v12z"/></svg><span>Deudas</span></div>
<div class="tab" onclick="go('inv')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg><span>Inversiones</span></div>
<div class="tab" onclick="go('stats')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg><span>Análisis</span></div>
</div>
<div class="toast" id="toast"></div>
<div class="ov" id="shModal" onclick="if(event.target===this)cls()"><div class="sh"><div class="sh-h"></div><div class="sh-hdr"><div class="sh-t" id="shTitle"></div><button class="sh-x" onclick="cls()">OK</button></div><div class="sh-b" id="shBody"></div></div></div>
<script>
const DB="https://finanzas-daniel-default-rtdb.firebaseio.com";
const f$=n=>"$"+Math.round(n).toLocaleString("es-CO");
const fU=n=>"$"+parseFloat(n).toFixed(2)+" USD";
const MS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CL=["#007aff","#5856d6","#34aadc","#ff9500","#ff2d55","#4cd964","#5ac8fa","#ffcc00","#ff3b30","#8e8e93"];
const priC=["#ff2d55","#ff9500","#007aff","#8e8e93"];
const priL=["Critico","Alto","Normal","Bajo"];
const MEDIOS=["Efectivo","TC Rappi","TC Bancolombia","TC Atl Nacional","Deel","Otro"];
const CATS=["Mercado","Alimentacion","Transporte","Salud","Entretenimiento","Hogar","Ropa","Educacion","Carro","Otro"];
const TIPOS=["Gasto recurrente","Gasto unico","Imprevisto","Manutencion diaria","Ya pagado","Por pagar"];
let D=null,cTab="dash",gSeg="fijos",stSeg="cats";

function diasInfo(v){if(!v)return{txt:'sin fecha',color:'var(--text3)'};const h=new Date();h.setHours(0,0,0,0);const d=new Date(v+'T00:00:00');const df=Math.round((d-h)/(864e5));if(df<0)return{txt:'vencio hace '+Math.abs(df)+'d',color:'var(--red)'};if(df===0)return{txt:'vence HOY',color:'var(--red)'};if(df<=3)return{txt:'vence en '+df+'d',color:'var(--orange)'};if(df<=7)return{txt:'en '+df+' dias',color:'var(--yellow)'};return{txt:v,color:'var(--text3)'}}

async function fb(m,p,d){try{const o={method:m,headers:{"Content-Type":"application/json"}};if(d)o.body=JSON.stringify(d);const r=await fetch(DB+"/"+p+".json",o);return r.json()}catch{return null}}
function cls(){document.getElementById("shModal").classList.remove("open")}
function modal(t,h){document.getElementById("shTitle").textContent=t;document.getElementById("shBody").innerHTML=h;document.getElementById("shModal").classList.add("open")}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.remove("show");void t.offsetWidth;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
function go(t){cTab=t;document.querySelectorAll(".tab").forEach((e,i)=>e.classList.toggle("active",["dash","gastos","deudas","inv","stats"][i]===t));render();window.scrollTo(0,0)}
function oe(o){return o?Object.entries(o):[]}
function T(){return D.config?.tasa||3764}
function scOpts(){return oe(D.subcats).map(function(x){return x[1].n})}

const SEED={config:{tasa:3764,ingUSD:1311,deelUSD:1229,deelRec:"Q5"},subcats:{s1:{n:"Mercado"},s2:{n:"Restaurante"},s3:{n:"Gasolina"},s4:{n:"Uber"},s5:{n:"Almuerzo oficina"},s6:{n:"Mant. carro"},s7:{n:"Farmacia"},s8:{n:"Snacks/cafe"}},pagos:{},deudas:{d1:{n:"Itau unificado",saldo:null,cuota:523000,meses:84,det:"1er pago 5 jun",conf:false,cat:"entidad",hist:{}},d2:{n:"TC Rappi plan",saldo:null,cuota:500000,meses:12,det:"Activado mayo",conf:false,cat:"entidad",hist:{}},d3:{n:"Credito carro Finandina",saldo:null,cuota:1900000,det:"Consultar",conf:false,cat:"entidad",hist:{}},d4:{n:"TC Bancolombia",saldo:2144372,cuota:190000,det:"+ $67 USD",conf:true,cat:"entidad",hist:{}},d5:{n:"TC Atletico Nal",saldo:360672,cuota:42000,det:"Cancelada",conf:false,cat:"entidad",hist:{}},d6:{n:"Credito papa",saldo:null,cuota:280000,det:"Confirmar",conf:false,cat:"entidad",hist:{}},d7:{n:"EPM atrasos",saldo:287500,det:"Resto factura",conf:true,cat:"entidad",hist:{}},d8:{n:"Avance Deel",saldo:1229,det:"Recobro 30 may",conf:true,cat:"deel",usd:true,hist:{}},d9:{n:"Simon",saldo:0,det:"Saldado",conf:true,cat:"persona",hist:{}},d10:{n:"Mama",saldo:0,det:"Saldada",conf:true,cat:"persona",hist:{}}},egresos:{e1:{n:"Arriendo",m:2338905,f:"Mensual",diaCobro:5,hist:{}},e2:{n:"Credito carro",m:1900000,f:"Mensual",diaCobro:15,hist:{}},e3:{n:"Manutencion hijos",m:680000,f:"Quincenal",mult:2,diaCobro:15,hist:{}},e4:{n:"Itau unificado",m:523000,f:"Desde junio",diaCobro:5,hist:{}},e5:{n:"TC Rappi",m:500000,f:"Plan 12m",hist:{}},e6:{n:"Internet Claro",m:375000,f:"Mensual",hist:{}},e7:{n:"EPM",m:400000,f:"Mensual",hist:{}},e8:{n:"Credito papa",m:280000,f:"Mensual",diaCobro:15,hist:{}},e9:{n:"TC Bancolombia",m:190000,f:"Mensual",hist:{}},e10:{n:"Claude Pro",m:72000,f:"$20 USD",hist:{}},e11:{n:"TC Atletico Nal",m:42000,f:"Mensual",diaCobro:20,hist:{}}},inversiones:{},gastos:{},ingresos:{},ingresosExtra:{},pendientes:{p1:{n:"Display Samsung",det:"$500k-$700k",min:500000,max:700000,fechaMax:"2025-06-30",done:false,prescindible:true},p2:{n:"Rayon bumper",det:"Cotizar",min:0,max:0,fechaMax:"2025-06-30",done:false,prescindible:true},p3:{n:"Impuesto vehicular",det:"JKM492",min:0,max:0,fechaMax:"2025-07-21",done:false,prescindible:false},p4:{n:"Tiquetes hijos",det:"3+1 vuelos ~$10M",min:9000000,max:11000000,fechaMax:"2025-07-01",done:false,prescindible:false}}};

async function init(){D=await fb("GET","");if(!D||!D.config){await fb("PUT","",SEED);D=SEED}["gastos","inversiones","pendientes","deudas","pagos","egresos","ingresos","subcats","ingresosExtra"].forEach(function(k){if(!D[k])D[k]={}});render()}

function autoPri(pagos){var nc={};pagos.filter(function(x){return !x[1].ej}).forEach(function(x){var b=x[1].n.replace(/\s*\(.*\)/,'').toLowerCase().trim();nc[b]=(nc[b]||0)+1});pagos.forEach(function(x){if(x[1].ej)return;var b=x[1].n.replace(/\s*\(.*\)/,'').toLowerCase().trim();if(b.indexOf("manutencion")>=0||b.indexOf("manutención")>=0)x[1].pri=0;else if(nc[b]>1&&x[1].pri>0)x[1].pri=0});return Object.keys(nc).filter(function(k){return nc[k]>1})}

// SYNC
function openSync(){
var p=oe(D.pagos),d=oe(D.deudas),g=oe(D.gastos).sort(function(a,b){return(b[1].ts||0)-(a[1].ts||0)}),e=oe(D.egresos),inv=oe(D.inversiones),ing=oe(D.ingresos).sort(function(a,b){return(b[1].fecha||'').localeCompare(a[1].fecha||'')});
var tE=e.reduce(function(s,x){return s+x[1].m*(x[1].mult||1)},0),iM=(D.config.ingUSD||1311)*2*T();
var now=new Date(),gM=g.filter(function(x){var dd=new Date(x[1].fecha);return dd.getMonth()===now.getMonth()&&dd.getFullYear()===now.getFullYear()});
var t="SYNC FINANZAS - "+now.toLocaleDateString('es-CO')+"\nTasa:$"+T()+" | Ingreso:$"+(D.config.ingUSD||1311)+"USD/q | Deel:$"+(D.config.deelUSD||0)+"USD\n\n";
t+="== PAGOS PENDIENTES ==\n";p.filter(function(x){return !x[1].ej}).sort(function(a,b){return(a[1].pri||3)-(b[1].pri||3)}).forEach(function(x){t+="["+priL[x[1].pri||3]+"] "+x[1].n+": "+f$(x[1].m)+" | "+( x[1].vence||'')+" | "+(x[1].medio||'')+"\n"});
t+="\n== DEUDAS ==\n";d.forEach(function(x){var sv=x[1].saldo===null?"NO CONFIRMADO":x[1].saldo===0?"SALDADO":x[1].usd?"$"+x[1].saldo+"USD":f$(x[1].saldo);t+=x[1].n+": "+sv+(x[1].cuota?" | "+f$(x[1].cuota)+"/mes":"")+(x[1].meses?" | "+x[1].meses+"m":"")+"\n"});
t+="\n== GASTOS MES: "+f$(gM.reduce(function(s,x){return s+x[1].monto},0))+" ==\n";var pc={};gM.forEach(function(x){var k=x[1].subcat||x[1].cat||'Otro';pc[k]=(pc[k]||0)+x[1].monto});Object.entries(pc).sort(function(a,b){return b[1]-a[1]}).forEach(function(x){t+="  "+x[0]+": "+f$(x[1])+"\n"});
if(inv.length){t+="\n== INVERSIONES ==\n";inv.forEach(function(x){var r=x[1].rend?Object.values(x[1].rend).reduce(function(s,v){return s+v},0):0;var rt=x[1].retiros?Object.values(x[1].retiros).reduce(function(s,v){return s+v},0):0;t+=x[1].n+": "+(x[1].moneda==='USD'?fU(x[1].monto+r-rt):f$(x[1].monto+r-rt))+"\n"})}
if(ing.length){t+="\n== INGRESOS ==\n";ing.slice(0,6).forEach(function(x){t+="  "+x[1].fecha+": $"+(x[1].montoUSD||0)+"USD @"+x[1].tasa+" = "+f$(x[1].montoCOP||0)+"\n"})}
var ie=oe(D.ingresosExtra);if(ie.length){t+="\n== INGRESOS EXTRA ==\n";ie.forEach(function(x){t+="  "+x[1].fecha+": "+f$(x[1].monto)+" - "+x[1].desc+"\n"})}
t+="\n== FLUJO ==\nEgresos: "+f$(tE)+"\nIngreso: "+f$(iM)+"\nBalance: "+f$(iM-tE)+"\n";
modal("Sync con Claude",'<p style="font-size:14px;color:var(--text3);margin-bottom:8px">Copia y pega en Claude.</p><textarea class="sync-t" id="syncT" readonly>'+t+'</textarea><button class="btn btn-g" onclick="navigator.clipboard.writeText(document.getElementById(\'syncT\').value).then(function(){toast(\'Copiado\')})">Copiar</button>');
}

// CRUD helpers
async function sv(p,d){await fb("PATCH",p,d)}

// GASTO

function addInv(){modal("Agregar inversion",'<div class="fg"><label class="lb">Nombre</label><input id="iN" placeholder="CDT, fondo, ahorro..." /></div><div class="r2"><div class="fg"><label class="lb">Monto</label><input id="iM" type="number" step="0.01" inputmode="decimal" /></div><div class="fg"><label class="lb">Moneda</label><select id="iMon"><option>COP</option><option>USD</option></select></div></div><div class="fg"><label class="lb">Detalle</label><input id="iDet" placeholder="Opcional" /></div><button class="btn btn-g" onclick="saveInv()">Guardar</button>')}
async function saveInv(){var n=document.getElementById("iN").value,monto=parseFloat(document.getElementById("iM").value),moneda=document.getElementById("iMon").value,det=document.getElementById("iDet").value;if(!n||!monto)return toast("Completa campos");var id="i_"+Date.now(),inv={n:n,monto:monto,moneda:moneda,det:det,activa:true,rend:{},retiros:{},ts:Date.now()};D.inversiones[id]=inv;await sv("inversiones/"+id,inv);cls();toast("Guardada");render()}

function invAction(id,tipo){var inv=D.inversiones[id];var mk=new Date().toISOString().slice(0,7);var label=tipo==='rend'?'Rendimiento':'Retiro/Venta';modal(label+": "+inv.n,'<div class="fg"><label class="lb">Mes</label><input id="iaM" value="'+mk+'" /></div><div class="fg"><label class="lb">Monto ('+inv.moneda+')</label><input id="iaV" type="number" step="0.01" inputmode="decimal" /></div>'+(tipo==='retiro'?'<div class="fg"><label class="lb"><input type="checkbox" id="iaVend" style="width:auto;margin-right:8px"/>Venta total</label></div>':'')+'<button class="btn btn-b" onclick="saveInvAction(\''+id+'\',\''+tipo+'\')">Guardar</button>')}

async function saveInvAction(id,tipo){
var m=document.getElementById("iaM").value,v=parseFloat(document.getElementById("iaV").value);
if(!m||isNaN(v))return toast("Completa");
var key=tipo==='rend'?'rend':'retiros';
if(!D.inversiones[id][key])D.inversiones[id][key]={};
var prev=D.inversiones[id][key][m]||0;
D.inversiones[id][key][m]=prev+v;
if(tipo==='retiro'&&document.getElementById("iaVend")&&document.getElementById("iaVend").checked){D.inversiones[id].activa=false;await sv("inversiones/"+id,{activa:false})}
await fb("PUT","inversiones/"+id+"/"+key+"/"+m,D.inversiones[id][key][m]);
cls();toast("Registrado: "+(tipo==='rend'?'+':'-')+fU(v));render()
}

// SVG LINE CHART
function lineChart(data,w,h,colors){
if(!data.length||!data[0].series)return'';
var maxV=0;data.forEach(function(d){d.series.forEach(function(s){if(s.v>maxV)maxV=s.v})});
if(maxV===0)return'<div style="padding:20px;text-align:center;color:var(--text3);font-size:14px">Sin datos</div>';
var pad=10,cw=w-pad*2,ch=h-pad*2;
var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:'+h+'px">';
// grid
for(var i=0;i<5;i++){var y=pad+ch*i/4;svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="var(--sep)" stroke-width="0.5"/>';}
// lines per series
var labels=data[0].series.map(function(s){return s.k});
labels.forEach(function(k,ki){
var pts=[];data.forEach(function(d,di){var s=d.series.find(function(x){return x.k===k});var v=s?s.v:0;var x=pad+di*(cw/(data.length-1||1));var y=pad+ch-(v/maxV)*ch;pts.push(x+','+y)});
svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+colors[ki%colors.length]+'" stroke-width="2" stroke-linejoin="round"/>';
});
// x labels
data.forEach(function(d,di){var x=pad+di*(cw/(data.length-1||1));svg+='<text x="'+x+'" y="'+(h-2)+'" text-anchor="middle" fill="var(--text3)" font-size="9">'+d.label+'</text>'});
svg+='</svg>';
// legend
svg+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">';
labels.forEach(function(k,i){svg+='<div style="display:flex;align-items:center;gap:4px;font-size:11px"><div style="width:10px;height:10px;border-radius:2px;background:'+colors[i%colors.length]+'"></div><span style="color:var(--text3)">'+k+'</span></div>'});
svg+='</div>';return svg;
}

["entidad","deel","persona"].forEach(function(cat){var items=deudas.filter(function(x){return x[1].cat===cat});if(!items.length)return;h+='<div class="sT">'+(cat==="entidad"?"Entidades":cat==="deel"?"Avances":"Personas")+'</div><div class="g">';
items.forEach(function(x){var sv2=x[1].saldo===null?"Sin confirmar":x[1].saldo===0?"Saldado":x[1].usd?fU(x[1].saldo):f$(x[1].saldo);var sc=x[1].saldo===0?"var(--green)":x[1].saldo===null?"var(--orange)":"var(--red)";var hk=x[1].hist?Object.keys(x[1].hist).sort().slice(-3):[];
h+='<div style="padding:12px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:500">'+x[1].n+'</div><div style="font-weight:600;color:'+sc+'">'+sv2+'</div></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px">'+(x[1].cuota?'<span class="pill" style="background:var(--gray6);color:var(--text3)">'+f$(x[1].cuota)+'/mes</span>':'')+(x[1].meses?'<span class="pill" style="background:rgba(0,122,255,.1);color:var(--blue)">'+x[1].meses+'m</span>':'')+'</div>'+(hk.length?'<div style="font-size:12px;color:var(--text3);margin-bottom:4px">'+hk.map(function(k){return k+': '+(x[1].usd?fU(x[1].hist[k]):f$(x[1].hist[k]))}).join(' → ')+'</div>':'')+'<div style="display:flex;gap:8px"><button class="btn btn-l" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="editDeuda(\''+x[0]+'\')">Editar</button><button class="btn btn-b" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="regSaldo(\''+x[0]+'\')">Saldo</button></div></div>'});
h+='</div>'});h+='</div>';
}

// ===== INVERSIONES =====
if(cTab==='inv'){
h+='<div class="header"><h1>'+tabs.inv+'</h1></div><div class="cnt">';
h+='<button class="btn btn-g" style="margin-bottom:14px" onclick="addInv()">+ Inversion</button>';
h+='<div class="m2"><div class="mc"><div class="mc-l">Capital COP</div><div class="mc-v" style="color:var(--green)">'+f$(iCOP)+'</div></div><div class="mc"><div class="mc-l">Capital USD</div><div class="mc-v" style="color:var(--green)">'+(iUSD?fU(iUSD):'$0')+'</div></div></div>';
h+='<div class="g">';
if(!invs.length)h+='<div style="padding:24px;text-align:center;color:var(--text3)">Agrega tu primera inversion</div>';
invs.forEach(function(x){var r=x[1].rend?Object.values(x[1].rend).reduce(function(s,v){return s+v},0):0;var rt=x[1].retiros?Object.values(x[1].retiros).reduce(function(s,v){return s+v},0):0;var cap=x[1].monto+r-rt;var closed=x[1].activa===false;
h+='<div style="padding:12px 16px;border-bottom:.5px solid var(--sep);'+(closed?'opacity:.5':'')+'"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:500">'+x[1].n+(closed?' <span class="pill" style="background:var(--gray6);color:var(--gray)">Cerrada</span>':'')+'</div><div style="font-weight:700;color:var(--green)">'+(x[1].moneda==='USD'?fU(cap):f$(cap))+'</div></div><div style="font-size:13px;color:var(--text3);margin-bottom:6px">Inv: '+(x[1].moneda==='USD'?fU(x[1].monto):f$(x[1].monto))+' · Rend: '+f$(r)+' · Ret: '+f$(rt)+'</div><div style="display:flex;gap:8px"><button class="btn btn-l" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="editInv(\''+x[0]+'\')">Editar</button>'+(!closed?'<button class="btn btn-g" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="invAction(\''+x[0]+'\',\'rend\')">Rend.</button><button class="btn btn-o" style="flex:1;padding:8px;font-size:14px;margin:0" onclick="invAction(\''+x[0]+'\',\'retiro\')">Retiro</button>':'')+'</div></div>'});
h+='</div></div>';
}

// ===== ANÁLISIS =====
if(cTab==='stats'){
h+='<div class="header"><h1>'+tabs.stats+'</h1></div><div class="cnt">';
h+='<div class="seg"><button class="'+(stSeg==='cats'?'a':'')+'" onclick="stSeg=\'cats\';render()">Categorias</button><button class="'+(stSeg==='hist'?'a':'')+'" onclick="stSeg=\'hist\';render()">Historial</button><button class="'+(stSeg==='ingresos'?'a':'')+'" onclick="stSeg=\'ingresos\';render()">Ingresos</button></div>';

if(stSeg==='cats'){
// By category trend
var mData=[];for(var mi2=5;mi2>=0;mi2--){var dd=new Date();dd.setMonth(dd.getMonth()-mi2);var kk=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0");var series=[];var catTotals={};gastos.filter(function(x){return x[1].fecha&&x[1].fecha.startsWith(kk)}).forEach(function(x){var c=x[1].cat||'Otro';catTotals[c]=(catTotals[c]||0)+x[1].monto});CATS.forEach(function(c){if(catTotals[c])series.push({k:c,v:catTotals[c]})});mData.push({label:MS[dd.getMonth()],series:series})}
h+='<div class="sT">Tendencia por categoria</div><div class="chart-wrap">'+lineChart(mData,350,180,CL)+'</div>';

// By subcategory trend
var scData=[];var allSc={};gastos.forEach(function(x){var k=x[1].subcat||x[1].cat||'Otro';allSc[k]=true});var scKeys=Object.keys(allSc).slice(0,8);
for(var mi3=5;mi3>=0;mi3--){var dd2=new Date();dd2.setMonth(dd2.getMonth()-mi3);var kk2=dd2.getFullYear()+"-"+String(dd2.getMonth()+1).padStart(2,"0");var series2=[];gastos.filter(function(x){return x[1].fecha&&x[1].fecha.startsWith(kk2)}).forEach(function(x){var k=x[1].subcat||x[1].cat||'Otro';var found=series2.find(function(s){return s.k===k});if(found)found.v+=x[1].monto;else series2.push({k:k,v:x[1].monto})});scData.push({label:MS[dd2.getMonth()],series:series2})}
h+='<div class="sT">Tendencia por subcategoria</div><div class="chart-wrap">'+lineChart(scData,350,180,CL)+'</div>';

// Bar chart this month
var scTotals={};gM.forEach(function(x){var k=x[1].subcat||x[1].cat||'Otro';scTotals[k]=(scTotals[k]||0)+x[1].monto});
var scArr=Object.entries(scTotals).sort(function(a,b){return b[1]-a[1]});
if(scArr.length){var mx2=Math.max.apply(null,scArr.map(function(x){return x[1]}));h+='<div class="sT">Este mes: '+f$(tGM)+'</div><div class="g" style="padding:12px 16px">';scArr.forEach(function(x,i){h+='<div class="bar-r"><div class="bar-l">'+x[0]+'</div><div class="bar-t"><div class="bar-f" style="width:'+Math.round(x[1]/mx2*100)+'%;background:'+CL[i%CL.length]+'"></div></div><div class="bar-v">'+f$(x[1])+'</div></div>'});h+='</div>'}
}

if(stSeg==='hist'){
// Quincena history
h+='<div class="sT">Registro por quincena '+now.getFullYear()+'</div><div class="g">';
h+='<div class="proj-row" style="font-weight:600;background:var(--gray6)"><span>Quincena</span><span>Ingreso</span><span>Gastos</span></div>';
ings.filter(function(x){return x[1].fecha&&x[1].fecha.startsWith(String(now.getFullYear()))}).reverse().forEach(function(x){
var gQ=gastos.filter(function(g){return g[1].fecha===x[1].fecha||Math.abs(new Date(g[1].fecha)-new Date(x[1].fecha))<(8*864e5)}).reduce(function(s,g){return s+g[1].monto},0);
h+='<div class="proj-row"><span>'+x[1].fecha+'</span><span style="color:var(--green)">'+f$(x[1].montoCOP||0)+'</span><span style="color:var(--red)">'+f$(gQ)+'</span></div>'});
if(!ings.filter(function(x){return x[1].fecha&&x[1].fecha.startsWith(String(now.getFullYear()))}).length)h+='<div style="padding:20px;text-align:center;color:var(--text3)">Registra ingresos para ver</div>';
h+='</div>';

// Gastos por mes bar
var mDat=[];for(var mi4=5;mi4>=0;mi4--){var dd3=new Date();dd3.setMonth(dd3.getMonth()-mi4);var kk3=dd3.getFullYear()+"-"+String(dd3.getMonth()+1).padStart(2,"0");mDat.push({mes:MS[dd3.getMonth()],total:gastos.filter(function(x){return x[1].fecha&&x[1].fecha.startsWith(kk3)}).reduce(function(s,x){return s+x[1].monto},0)})}
var mxM=Math.max.apply(null,mDat.map(function(m){return m.total}).concat([1]));
h+='<div class="sT">Gastos por mes</div><div class="g" style="padding:12px 16px">';mDat.forEach(function(m,i){h+='<div class="bar-r"><div class="bar-l">'+m.mes+'</div><div class="bar-t"><div class="bar-f" style="width:'+Math.round(m.total/mxM*100)+'%;background:'+CL[i%CL.length]+'"></div></div><div class="bar-v">'+f$(m.total)+'</div></div>'});h+='</div>';
}

if(stSeg==='ingresos'){
// Income history
h+='<div class="sT">Ingresos registrados</div><div class="g">';
if(ings.length){ings.slice(0,15).forEach(function(x){h+='<div style="padding:10px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">'+x[1].fecha+'</span><span style="font-weight:600;color:var(--green)">'+f$(x[1].montoCOP||0)+'</span></div><div style="font-size:12px;color:var(--text3);margin-top:2px">$'+(x[1].montoUSD||0)+' USD @ $'+x[1].tasa+(x[1].avanceDeel?' · Deel: $'+x[1].avanceDeel+'USD':'')+'</div></div>'})}
else h+='<div style="padding:20px;text-align:center;color:var(--text3)">Registra ingresos</div>';
h+='</div>';

// Income trend
if(ings.length>1){var ingD=ings.slice(0,12).reverse();var ingData=ingD.map(function(x){return{label:x[1].fecha?x[1].fecha.slice(5):'',series:[{k:'COP',v:x[1].montoCOP||0},{k:'USD',v:(x[1].montoUSD||0)*1000}]}});
h+='<div class="sT">Tendencia ingreso COP</div><div class="chart-wrap">'+lineChart(ingData,350,160,['#4cd964','#007aff'])+'</div>'}

// Extras
if(ingsE.length){h+='<div class="sT">Ingresos extra</div><div class="g">';ingsE.forEach(function(x){h+='<div style="padding:10px 16px;border-bottom:.5px solid var(--sep)"><div style="display:flex;justify-content:space-between"><span style="font-weight:500">'+x[1].desc+'</span><span style="font-weight:600;color:var(--green)">'+(x[1].moneda==='USD'?fU(x[1].monto):f$(x[1].monto))+'</span></div><div style="font-size:12px;color:var(--text3)">'+x[1].fecha+'</div></div>'});h+='</div>'}
}

// Resumen
h+='<div class="sT">Resumen</div><div class="g"><div class="r"><div class="rb"><div class="rt">Egresos fijos</div></div><div class="rv" style="color:var(--red)">'+f$(tE)+'</div></div><div class="r"><div class="rb"><div class="rt">Variables mes</div></div><div class="rv" style="color:var(--orange)">'+f$(tGM)+'</div></div><div class="r"><div class="rb"><div class="rt">Ingreso</div></div><div class="rv" style="color:var(--green)">'+f$(iM)+'</div></div><div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(0,122,255,.06)"><strong>Balance real</strong><strong style="font-size:20px;color:'+(iM-tE-tGM<0?'var(--red)':'var(--green)')+'">'+f$(iM-tE-tGM)+'</strong></div></div>';
h+='<button class="btn btn-l" onclick="location.reload()">Sincronizar</button>';
h+='</div>';
}

document.getElementById("app").innerHTML=h;
}

init();
</script>
</body>
</html>
