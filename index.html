<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;
  --gray:#8E8E93;--gray3:#C7C7CC;--gray4:#D1D1D6;--gray5:#E5E5EA;--gray6:#F2F2F7;
  --bg:#F2F2F7;--card:#FFFFFF;--sep:rgba(60,60,67,0.12);
  --text:#000;--text2:#3C3C43;--text3:#8E8E93;
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-top:calc(var(--safe-top)+52px);padding-bottom:calc(var(--safe-bottom)+56px);-webkit-font-smoothing:antialiased}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding-top:var(--safe-top);background:rgba(249,249,249,0.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid var(--sep)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.navbar h1{font-size:17px;font-weight:600;flex:1;text-align:center}
.nav-btn{font-size:15px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer;padding:4px 0;font-weight:400;min-width:60px}
.nav-btn:first-child{text-align:left}
.nav-btn:last-child{text-align:right}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding-bottom:var(--safe-bottom);background:rgba(249,249,249,0.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid var(--sep)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0 2px;font-size:10px;color:var(--gray);cursor:pointer}
.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:2px;fill:currentColor}
.content{padding:0 16px 20px}
.section{display:none}.section.active{display:block}
.sec-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.02em;padding:24px 0 8px}
.group{background:var(--card);border-radius:10px;overflow:hidden;margin-bottom:16px}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:44px;border-bottom:0.5px solid var(--sep);cursor:pointer;transition:background 0.1s}
.row:last-child{border-bottom:none}
.row:active{background:var(--gray5)}
.row.done{opacity:0.4}
.chk{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid var(--gray3);display:flex;align-items:center;justify-content:center}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'✓';color:white;font-size:14px;font-weight:600}
.row-body{flex:1;min-width:0}
.row-title{font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row.done .row-title{text-decoration:line-through;color:var(--text3)}
.row-sub{font-size:13px;color:var(--text3);margin-top:1px}
.row-right{font-size:16px;font-weight:500;color:var(--red);flex-shrink:0}
.row.done .row-right{color:var(--text3)}
.row-chevron{color:var(--gray3);font-size:16px;flex-shrink:0}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:2px 8px;border-radius:10px;margin-right:4px}
.pill-blue{background:rgba(0,122,255,0.12);color:var(--blue)}
.pill-green{background:rgba(52,199,89,0.12);color:var(--green)}
.pill-orange{background:rgba(255,149,0,0.12);color:var(--orange)}
.pill-red{background:rgba(255,59,48,0.12);color:var(--red)}
.pill-gray{background:rgba(142,142,147,0.12);color:var(--gray)}
.alert{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert-icon{font-size:22px;flex-shrink:0;line-height:1}
.alert-body{flex:1;font-size:15px;line-height:1.4}
.alert-body strong{font-weight:600}
.alert-body small{font-size:13px;color:var(--text3);display:block;margin-top:2px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:var(--card);border-radius:10px;padding:14px 16px}
.metric-label{font-size:13px;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.metric-val.red{color:var(--red)}.metric-val.green{color:var(--green)}.metric-val.orange{color:var(--orange)}
.q-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--sep)}
.q-header.st-done{background:rgba(52,199,89,0.08)}
.q-header.st-active{background:rgba(0,122,255,0.08)}
.q-header.st-future{background:rgba(142,142,147,0.06)}
.q-title{font-size:16px;font-weight:600}
.q-nota{font-size:12px;color:var(--text3);margin-top:2px;max-width:260px}
input,select,textarea{width:100%;padding:12px 16px;font-size:16px;border:none;background:var(--card);border-radius:10px;margin-bottom:8px;font-family:inherit;color:var(--text);-webkit-appearance:none;border:0.5px solid var(--sep)}
select{padding-right:36px}
.btn{width:100%;padding:14px;font-size:17px;font-weight:600;background:var(--blue);color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit}
.btn:active{opacity:0.7}
.btn-gray{background:rgba(142,142,147,0.12);color:var(--blue)}
.btn-green{background:var(--green)}
.btn-orange{background:var(--orange)}
.btn-sm{padding:10px 16px;font-size:15px;width:auto;display:inline-block}
.row-2col{display:flex;gap:8px}.row-2col>*{flex:1}
.bar-chart{padding:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:13px;color:var(--text3);width:80px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--gray6);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--blue)}
.bar-val{font-size:13px;font-weight:500;color:var(--text2);width:65px;flex-shrink:0}
.summary-row{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--sep)}
.summary-row:last-child{border-bottom:none}
.summary-row .label{font-size:16px;color:var(--text)}.summary-row .label small{font-size:13px;color:var(--text3);display:block}
.summary-row .val{font-size:16px;font-weight:600}
.deuda-card{padding:14px 16px;border-bottom:0.5px solid var(--sep)}.deuda-card:last-child{border-bottom:none}
.deuda-top{display:flex;justify-content:space-between;margin-bottom:4px}
.deuda-name{font-size:16px;font-weight:500}.deuda-saldo{font-size:16px;font-weight:600}
.deuda-det{font-size:13px;color:var(--text3);margin-top:4px}
.gasto-item{padding:12px 16px;border-bottom:0.5px solid var(--sep)}.gasto-item:last-child{border-bottom:none}
.gasto-top{display:flex;justify-content:space-between}
.gasto-desc{font-size:16px;font-weight:500}.gasto-monto{font-size:16px;font-weight:600;color:var(--red)}
.gasto-bottom{display:flex;justify-content:space-between;margin-top:3px}
/* MODAL / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:var(--card);border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:0 0 calc(var(--safe-bottom) + 16px);animation:sheetUp 0.3s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--gray3);margin:8px auto 4px}
.sheet-header{padding:12px 16px;border-bottom:0.5px solid var(--sep);display:flex;justify-content:space-between;align-items:center}
.sheet-title{font-size:17px;font-weight:600}
.sheet-close{font-size:15px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer;padding:4px}
.sheet-body{padding:16px}
.sync-text{width:100%;min-height:200px;font-size:13px;font-family:'SF Mono',Menlo,monospace;padding:12px;background:var(--gray6);border:none;border-radius:8px;color:var(--text);resize:none;margin-bottom:12px;line-height:1.5}
.edit-label{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:4px;display:block}
.edit-group{margin-bottom:16px}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1C1C1E;--sep:rgba(84,84,88,0.65);--text:#FFF;--text2:#EBEBF5;--text3:#8E8E93;--gray5:#2C2C2E;--gray6:#1C1C1E}
  .navbar,.tabbar{background:rgba(28,28,30,0.88)}
  input,select,textarea{background:#2C2C2E;color:white;border-color:rgba(84,84,88,0.4)}
  .sync-text{background:#2C2C2E}
}
</style>
</head>

let D=null,currentTab="resumen";

async function fb(m,p,d){try{const o={method:m,headers:{"Content-Type":"application/json"}};if(d)o.body=JSON.stringify(d);const r=await fetch(DB+"/"+p+".json",o);return await r.json()}catch{return null}}
const fbGet=p=>fb("GET",p);
const fbSet=(p,d)=>fb("PUT",p,d);
const fbPatch=(p,d)=>fb("PATCH",p,d);

async function init(){
  D=await fbGet("");
  if(!D||!D.config){await fbSet("",SEED);D=SEED}
  if(!D.gastos)D.gastos={};
  render();
}

function switchTab(t){
  currentTab=t;
  document.querySelectorAll(".tab").forEach((el,i)=>{el.classList.toggle("active",["resumen","pagos","deudas","gastos","flujo"][i]===t)});
  document.querySelectorAll(".section").forEach(el=>el.classList.remove("active"));
  document.getElementById("s_"+t).classList.add("active");
  document.getElementById("navTitle").textContent={resumen:"Finanzas",pagos:"Pagos",deudas:"Deudas",gastos:"Gastos",flujo:"Flujo"}[t];
  document.getElementById("navRight").style.display=t==="resumen"?"":"none";
  window.scrollTo(0,0);
}

// SYNC
function openSync(){
  const tasa=D.config?.tasaActual||3764;
  const pagos=Object.entries(D.pagos||{});
  const quincenas=Object.entries(D.quincenas||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const deudas=Object.entries(D.deudas||{});
  const gastos=Object.entries(D.gastos||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const pends=Object.entries(D.pendientes||{});
  const confs=Object.entries(D.confirmar||{});
  const egs=Object.entries(D.egresos||{});
  const totalEg=egs.reduce((s,[,e])=>s+e.m*(e.mult||1),0);
  const ingMes=(D.config?.ingresoUSD||1311)*2*tasa;
  const now=new Date();
  const gMes=gastos.filter(([,g])=>{const d=new Date(g.fecha);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const totalGMes=gMes.reduce((s,[,g])=>s+g.monto,0);

  let t=`SINCRONIZACION FINANZAS DANIEL - ${now.toLocaleDateString('es-CO')}\n`;
  t+=`Tasa: $${tasa} | Ingreso: $${D.config?.ingresoUSD} USD/quincenal\n`;
  t+=`Deel avance activo: $${D.config?.deelAvanceUSD} USD | Recobro: ${D.config?.deelRecobro}\n\n`;

  t+=`=== QUINCENAS ===\n`;
  quincenas.forEach(([qid,q])=>{
    const qp=pagos.filter(([,p])=>p.q===qid);
    const pend=qp.filter(([,p])=>!p.ej);
    const exec=qp.filter(([,p])=>p.ej);
    t+=`\n[${q.t}] ${q.st.toUpperCase()}${pend.length>0?' - '+pend.length+' pendientes':' - completa'}\n`;
    if(q.nota)t+=`  Nota: ${q.nota}\n`;
    if(pend.length>0){t+=`  PENDIENTES:\n`;pend.forEach(([,p])=>t+=`    - ${p.n}: ${fmt(p.m)} (${p.tp})${p.nota?' ['+p.nota+']':''}\n`);}
    if(exec.length>0&&q.st!=='done'){t+=`  EJECUTADOS:\n`;exec.forEach(([,p])=>t+=`    ✓ ${p.n}: ${fmt(p.m)}\n`);}
  });

  t+=`\n=== DEUDAS ===\n`;
  deudas.forEach(([,d])=>{
    const sv=d.saldo===null?"POR CONFIRMAR":d.saldo===0?"SALDADO":d.usd?`$${d.saldo} USD (~${fmt(d.saldo*tasa)})`:fmt(d.saldo);
    t+=`${d.n}: ${sv}${d.cuota?' | Cuota: '+fmt(d.cuota)+'/mes':''}${d.meses?' | '+d.meses+' meses':''}${!d.conf?' [NO CONFIRMADO]':''}\n`;
  });

  t+=`\n=== GASTOS VARIABLES MES: ${fmt(totalGMes)} ===\n`;
  if(gMes.length>0){
    const porCat={};gMes.forEach(([,g])=>{porCat[g.cat]=(porCat[g.cat]||0)+g.monto});
    Object.entries(porCat).forEach(([c,v])=>t+=`  ${c}: ${fmt(v)}\n`);
  }else{t+=`  Sin gastos registrados este mes\n`;}

  t+=`\n=== FLUJO MENSUAL ===\n`;
  t+=`Egresos fijos: ${fmt(totalEg)}\n`;
  t+=`Ingreso mensual: ${fmt(ingMes)}\n`;
  t+=`Balance fijos: ${fmt(ingMes-totalEg)}\n`;
  t+=`Gastos variables mes: ${fmt(totalGMes)}\n`;
  t+=`Balance real: ${fmt(ingMes-totalEg-totalGMes)}\n`;

  const pendC=confs.filter(([,c])=>!c.done);
  if(pendC.length>0){t+=`\n=== DATOS POR CONFIRMAR ===\n`;pendC.forEach(([,c])=>t+=`  - ${c.t}\n`);}

  const pendG=pends.filter(([,p])=>!p.done);
  if(pendG.length>0){t+=`\n=== PENDIENTES NO PRIORITARIOS ===\n`;pendG.forEach(([,p])=>t+=`  - ${p.n}: ${p.det}\n`);}

  document.getElementById("syncText").value=t;
  document.getElementById("syncOverlay").classList.add("open");
  document.getElementById("copyMsg").style.display="none";
}

async function copySync(){
  try{await navigator.clipboard.writeText(document.getElementById("syncText").value);document.getElementById("copyMsg").style.display="block"}
  catch{document.getElementById("syncText").select()}
}

    const stC=q.st==="done"?"st-done":q.st==="active"?"st-active":"st-future";
    const pC=q.st==="done"?"pill-green":q.st==="active"?"pill-blue":"pill-gray";
    const pT=q.st==="done"?"Ejecutada":q.st==="active"?"En curso":"Proxima";
    h+=`<div class="group"><div class="q-header ${stC}"><div><div class="q-title">${q.t}</div>${q.nota?`<div class="q-nota">${q.nota}</div>`:''}</div><div><span class="pill ${pC}">${pT}</span>${pend.length>0&&q.st!=='done'?`<span class="pill pill-red">${pend.length}</span>`:''}</div></div>`;
    qp.forEach(([pid,p])=>{
      h+=`<div class="row ${p.ej?'done':''}">
        <div class="chk ${p.ej?'on':''}" onclick="event.stopPropagation();togglePago('${pid}')"></div>
        <div class="row-body" onclick="editPago('${pid}')">
          <div class="row-title">${p.n}</div>
          ${p.tp==='rappi'?'<span class="pill pill-blue">Rappi</span>':''}
          ${p.nota&&!p.ej?`<div class="row-sub">${p.nota}</div>`:''}
        </div>
        <div class="row-right" onclick="editPago('${pid}')">${fmt(p.m)}</div>
        <div class="row-chevron" onclick="editPago('${pid}')">›</div>
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById("s_pagos").innerHTML=h;

  // DEUDAS
  h=`<div class="metrics">
    <div class="metric-card"><div class="metric-label">Confirmada</div><div class="metric-val red">${fmt(totalDeudaConf)}</div></div>
    <div class="metric-card"><div class="metric-label">Sin confirmar</div><div class="metric-val orange">${deudas.filter(([,d])=>!d.conf&&d.saldo!==0).length} saldos</div></div>
  </div>`;
  ["entidad","deel","persona"].forEach(cat=>{
    const items=deudas.filter(([,d])=>d.cat===cat);if(!items.length)return;
    h+=`<div class="sec-title">${cat==="entidad"?"Entidades":cat==="deel"?"Avances Deel":"Personas"}</div><div class="group">`;
    items.forEach(([id,d])=>{
      const sv=d.saldo===null?"Por confirmar":d.saldo===0?"Saldado":d.usd?`$${d.saldo} USD`:fmt(d.saldo);
      const sc=d.saldo===0?"var(--green)":d.saldo===null?"var(--orange)":"var(--red)";
      h+=`<div class="deuda-card" onclick="editDeuda('${id}')" style="cursor:pointer">
        <div class="deuda-top"><div class="deuda-name">${d.n}</div><div class="deuda-saldo" style="color:${sc}">${sv} ›</div></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin:4px 0">
          ${d.cuota?`<span class="pill pill-gray">${fmt(d.cuota)}/mes</span>`:''}
          ${d.meses?`<span class="pill pill-blue">${d.meses-(d.pagados||0)} meses</span>`:''}
          ${!d.conf&&d.saldo!==0?'<span class="pill pill-orange">Confirmar</span>':''}
        </div>
        <div class="deuda-det">${d.det}</div>
      </div>`;
    });h+=`</div>`;
  });
  document.getElementById("s_deudas").innerHTML=h;

  // GASTOS
  const today=new Date().toISOString().slice(0,10);
  h=`<div class="sec-title">Registrar gasto</div>
  <select id="gCat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select>
  <input id="gDesc" placeholder="Descripcion" />
  <div class="row-2col"><input id="gMonto" type="number" inputmode="numeric" placeholder="Monto" /><input id="gFecha" type="date" value="${today}" /></div>
  <button class="btn" onclick="addGasto()">Registrar</button>`;
  const gPorCat=CATS.map(c=>({name:c,total:gMes.filter(([,g])=>g.cat===c).reduce((s,[,g])=>s+g.monto,0)})).filter(c=>c.total>0);
  if(gPorCat.length>0){
    const maxV=Math.max(...gPorCat.map(c=>c.total));
    h+=`<div class="sec-title">Este mes: ${fmt(totalGMes)}</div><div class="group"><div class="bar-chart">`;
    gPorCat.forEach(c=>{h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.total/maxV*100)}%"></div></div><div class="bar-val">${fmt(c.total)}</div></div>`});
    h+=`</div></div>`;
  }
  h+=`<div class="sec-title">Historial (${gastos.length})</div><div class="group">`;
  if(!gastos.length)h+=`<div style="padding:24px;text-align:center;color:var(--text3)">Sin gastos</div>`;
  gastos.slice(0,30).forEach(([,g])=>{
    const ie=g.cat==="Transporte empresa";
    h+=`<div class="gasto-item"><div class="gasto-top"><div class="gasto-desc">${g.desc}</div><div class="gasto-monto" style="color:${ie?'var(--text3)':'var(--red)'}">${fmt(g.monto)}</div></div><div class="gasto-bottom"><span class="pill ${ie?'pill-gray':'pill-blue'}">${g.cat}</span><span style="font-size:13px;color:var(--text3)">${g.fecha}</span></div></div>`;
  });h+=`</div>`;
  h+=`<div class="sec-title">Pendientes</div><div class="group">`;
  pends.forEach(([id,p])=>{
    const r=p.min>0&&p.max>0?`${fmt(p.min)}-${fmt(p.max)}`:p.min>0?`~${fmt(p.min)}`:"Cotizar";
    h+=`<div class="row ${p.done?'done':''}" onclick="togglePend('${id}')"><div class="chk ${p.done?'on':''}"></div><div class="row-body"><div class="row-title">${p.n}</div><div class="row-sub">${p.det}</div></div><div class="row-right" style="color:var(--orange);font-size:14px">${r}</div></div>`;
  });h+=`</div>`;
  document.getElementById("s_gastos").innerHTML=h;

  // FLUJO
  h=`<div class="sec-title">Egresos fijos mensuales</div><div class="group">`;
  egs.forEach(([,e])=>{h+=`<div class="summary-row"><div class="label">${e.n}<small>${e.f}</small></div><div class="val" style="color:var(--red)">${e.mult?fmt(e.m)+" x"+e.mult:fmt(e.m)}</div></div>`});
  h+=`<div style="display:flex;justify-content:space-between;padding:14px 16px;background:rgba(255,59,48,0.06)"><div style="font-weight:600">Total egresos</div><div style="font-weight:700;color:var(--red)">${fmt(totalEg)}</div></div></div>`;
  h+=`<div class="group">
    <div class="summary-row"><div class="label">Ingreso mensual<small>$${D.config?.ingresoUSD||1311}x2 USD @ $${tasa}</small></div><div class="val" style="color:var(--green)">${fmt(ingMes)}</div></div>
    <div class="summary-row"><div class="label">Balance fijos</div><div class="val" style="color:${balance<0?'var(--red)':'var(--green)'}">${fmt(balance)}</div></div>
    ${totalGMes>0?`<div class="summary-row"><div class="label">Variables mes</div><div class="val" style="color:var(--orange)">${fmt(totalGMes)}</div></div>
    <div class="summary-row" style="background:rgba(0,122,255,0.06)"><div class="label" style="font-weight:600">Balance real</div><div class="val" style="font-size:20px;color:${balance-totalGMes<0?'var(--red)':'var(--green)'}">${fmt(balance-totalGMes)}</div></div>`:''}
  </div>`;
  h+=`<div style="margin-top:12px"><button class="btn btn-gray" onclick="location.reload()">Sincronizar datos</button></div>`;
  h+=`<div style="text-align:center;padding:16px;font-size:13px;color:var(--text3)">Firebase: finanzas-daniel<br>Tasa: $${tasa} COP/USD</div>`;
  document.getElementById("s_flujo").innerHTML=h;
}

init();
</script>
</body>
</html>
