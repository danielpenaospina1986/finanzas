<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
:root{--blue:#007aff;--green:#4cd964;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;--purple:#5856d6;--teal:#34aadc;--yellow:#ffcc00;--gray:#8e8e93;--gray3:#c7c7cc;--gray5:#e5e5ea;--gray6:#f2f2f7;--bg:#f2f2f7;--card:#fff;--sep:rgba(60,60,67,.12);--text:#000;--text3:#8e8e93;--safe-t:env(safe-area-inset-top,20px);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-bottom:calc(var(--safe-b)+70px);-webkit-font-smoothing:antialiased}
.hdr{padding:calc(var(--safe-t)+8px) 16px 10px;display:flex;justify-content:space-between;align-items:center}.hdr h1{font-size:28px;font-weight:700;letter-spacing:-.5px}.hdr button{font-size:16px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding:4px 0 calc(var(--safe-b)+4px);background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;font-size:10px;font-weight:500;color:var(--gray);cursor:pointer}.tab.active{color:var(--blue)}.tab svg{width:22px;height:22px;margin-bottom:1px}
.cnt{padding:0 16px 16px}.sec{display:none}.sec.active{display:block}
.sT{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:16px 0 6px}
.g{background:var(--card);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 0 0 .5px var(--sep)}
.r{display:flex;align-items:center;gap:10px;padding:11px 14px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer}.r:last-child{border-bottom:none}.r:active{background:var(--gray6)}
.rb{flex:1;min-width:0}.rt{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rs{font-size:12px;color:var(--text3);margin-top:1px}
.rv{font-size:15px;font-weight:600;flex-shrink:0}
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px}
.chk{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid var(--gray3);display:flex;align-items:center;justify-content:center}.chk.on{background:var(--green);border-color:var(--green)}.chk.on::after{content:'✓';color:#fff;font-size:13px;font-weight:600}
.seg{display:flex;background:rgba(142,142,147,.12);border-radius:8px;padding:2px;margin-bottom:12px}.seg button{flex:1;padding:6px 2px;text-align:center;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text3);border-radius:7px;cursor:pointer;font-family:inherit}.seg button.a{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
input,select{width:100%;padding:10px 14px;font-size:15px;border:.5px solid var(--sep);background:var(--card);border-radius:10px;margin-bottom:7px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.btn{width:100%;padding:13px;font-size:16px;font-weight:600;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:7px}.btn:active{opacity:.8}
.btn-b{background:var(--blue)}.btn-g{background:var(--green)}.btn-o{background:var(--orange)}.btn-r{background:var(--red)}.btn-l{background:rgba(142,142,147,.12);color:var(--blue)}.btn-p{background:var(--purple)}
.r2{display:flex;gap:7px}.r2>*{flex:1}.lb{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:3px;display:block}.fg{margin-bottom:10px}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:0 0 0 .5px var(--sep)}.mc-l{font-size:11px;color:var(--text3);margin-bottom:2px}.mc-v{font-size:20px;font-weight:700}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.act{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:11px 12px;border:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;box-shadow:0 0 0 .5px var(--sep)}.act:active{background:var(--gray6)}
.act-i{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.q-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--sep);background:rgba(0,122,255,.06)}
.q-title{font-size:14px;font-weight:600}.q-sub{font-size:11px;color:var(--text3)}.q-amt{font-size:16px;font-weight:700}
.q-exp{cursor:pointer;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--sep);background:var(--card)}
.q-exp:active{background:var(--gray6)}
.q-det{max-height:0;overflow:hidden;transition:max-height .3s}.q-det.open{max-height:3000px}
.bar-r{display:flex;align-items:center;gap:5px;margin-bottom:6px}.bar-l{font-size:10px;color:var(--text3);width:60px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-t{flex:1;height:18px;background:var(--gray6);border-radius:4px;overflow:hidden}.bar-f{height:100%;border-radius:4px;min-width:2px}.bar-v{font-size:10px;font-weight:600;width:62px;flex-shrink:0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}.ov.open{display:flex}
.sh{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding-bottom:calc(var(--safe-b)+20px);animation:su .25s ease}@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-h{width:36px;height:5px;border-radius:3px;background:var(--gray3);margin:8px auto 4px}
.sh-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.sh-t{font-size:16px;font-weight:600}.sh-x{font-size:16px;color:var(--blue);background:none;border:none;font-family:inherit;cursor:pointer}
.sh-b{padding:0 14px 14px}
.sync-t{width:100%;min-height:160px;font-size:10px;font-family:Menlo,monospace;padding:8px;background:var(--card);border:.5px solid var(--sep);border-radius:8px;color:var(--text);resize:none;margin-bottom:8px;line-height:1.4}
.toast{position:fixed;top:calc(var(--safe-t)+10px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 18px;border-radius:18px;font-size:13px;font-weight:500;z-index:300;display:none}.toast.show{display:block;animation:fio 2s ease}@keyframes fio{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--sep:rgba(84,84,88,.65);--text:#fff;--text3:#8e8e93;--gray5:#2c2c2e;--gray6:#1c1c1e}.tabbar{background:rgba(28,28,30,.88)}input,select{background:#2c2c2e;color:#fff;border-color:rgba(84,84,88,.4)}.seg{background:rgba(118,118,128,.24)}.seg button.a{background:#2c2c2e}}
</style>
</head>
<body>
<div id="app"></div>
<div class="tabbar">
<div class="tab active" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg><span>Checklist</span></div>
<div class="tab" onclick="go('gastos')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>Gastos</span></div>
<div class="tab" onclick="go('inv')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg><span>Inversiones</span></div>
<div class="tab" onclick="go('stats')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg><span>Análisis</span></div>
<div class="tab" onclick="go('info')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span>Info</span></div>
</div>
<div class="toast" id="toast"></div>
<div class="ov" id="shModal" onclick="if(event.target===this)cls()"><div class="sh"><div class="sh-h"></div><div class="sh-hdr"><div class="sh-t" id="shTitle"></div><button class="sh-x" onclick="cls()">OK</button></div><div class="sh-b" id="shBody"></div></div></div>
<script>
var DB="https://finanzas-daniel-default-rtdb.firebaseio.com";
var f$=function(n){return"$"+Math.round(n).toLocaleString("es-CO")};
var fU=function(n){return"$"+parseFloat(n||0).toFixed(2)+" USD"};
var MS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var CL=["#007aff","#5856d6","#34aadc","#ff9500","#ff2d55","#4cd964","#5ac8fa","#ffcc00","#ff3b30","#8e8e93"];
var MEDIOS=["Efectivo","TC Rappi","TC Bancolombia","TC Atl Nacional","Otro"];
var D=null,cTab="dash",gSeg="fijos",stSeg="cats";

function diasI(v){if(!v)return{t:"sin fecha",c:"var(--text3)"};var h=new Date();h.setHours(0,0,0,0);var d=new Date(v+"T00:00:00");var df=Math.round((d-h)/864e5);if(df<0)return{t:"vencio "+Math.abs(df)+"d",c:"var(--red)"};if(df===0)return{t:"HOY",c:"var(--red)"};if(df<=3)return{t:"en "+df+"d",c:"var(--orange)"};if(df<=7)return{t:"en "+df+"d",c:"var(--yellow)"};return{t:v.slice(5),c:"var(--text3)"}}

// Quincena helpers
function qInfo(d){var dd=d||new Date();var y=dd.getFullYear(),m=dd.getMonth(),day=dd.getDate();
var isQ1=day<=14;
var start=isQ1?1:15;var endD=isQ1?14:new Date(y,m+1,0).getDate();
var label=(isQ1?"Q1":"Q2")+" "+MS[m]+" "+y;var range=start+" - "+endD+" "+MS[m];
var key=y+"-"+String(m+1).padStart(2,"0")+"-"+(isQ1?"Q1":"Q2");
return{label:label,range:range,key:key,startDay:start,endDay:endD,month:m,year:y,isQ1:isQ1}}

function qInfoAt(offset){var d=new Date();var totalQ=d.getDate()<=14?0:1;totalQ+=offset;var addMonths=Math.floor(totalQ/2);var isQ1=totalQ%2===0;
var nd=new Date(d.getFullYear(),d.getMonth()+addMonths,isQ1?1:15);return qInfo(nd)}

function payDateInQ(dia,qi){
var y=qi.year,m=qi.month;
if(qi.isQ1){return(dia>=1&&dia<=14)?new Date(y,m,dia).toISOString().slice(0,10):null}
else{return(dia>=15)?new Date(y,m,dia).toISOString().slice(0,10):null}}

async function fb(mt,p,d){try{var o={method:mt,headers:{"Content-Type":"application/json"}};if(d)o.body=JSON.stringify(d);var r=await fetch(DB+"/"+p+".json",o);return r.json()}catch(e){return null}}
function cls(){document.getElementById("shModal").classList.remove("open")}
function modal(t,h){document.getElementById("shTitle").textContent=t;document.getElementById("shBody").innerHTML=h;document.getElementById("shModal").classList.add("open")}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.remove("show");void t.offsetWidth;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2200)}
function go(t){cTab=t;document.querySelectorAll(".tab").forEach(function(e,i){e.classList.toggle("active",["dash","gastos","inv","stats","info"][i]===t)});render();window.scrollTo(0,0)}
function oe(o){return o?Object.entries(o):[]}
async function sv(p,d){await fb("PATCH",p,d)}
function scOpts(){return oe(D.subcats).map(function(x){return x[1].n})}

var SEED={config:{tasa:3764,ingUSD:1311},
subcats:{s1:{n:"Mercado"},s2:{n:"Restaurante"},s3:{n:"Gasolina"},s4:{n:"Almuerzo oficina"},s5:{n:"Snacks"},s6:{n:"Farmacia"},s7:{n:"Ninos"}},
fijos:{f1:{n:"Arriendo",m:2338905,dia:5},f2:{n:"Manutencion hijos",m:680000,dia:15,mult:2},f3:{n:"Servicios EPM",m:400000,dia:20},f4:{n:"Internet Claro",m:375000,dia:15},f5:{n:"Claude Pro",m:72000,dia:1}},
deudas:{d1:{n:"Itau unificado",saldo:null,cuota:523000,dia:5,meses:84,det:"Desde jun",conf:false,cat:"banco",contado:false,hist:{}},d2:{n:"TC Rappi plan",saldo:null,cuota:500000,dia:15,meses:12,det:"Plan 12m",conf:false,cat:"tc",cupoDisp:null,contado:false,hist:{}},d3:{n:"Credito carro Finandina",saldo:null,cuota:1900000,dia:15,det:"Consultar",conf:false,cat:"banco",contado:false,hist:{}},d4:{n:"TC Bancolombia",saldo:2144372,cuota:190000,dia:16,det:"+ $67 USD",conf:true,cat:"tc",cupoDisp:null,contado:false,hist:{}},d5:{n:"TC Atletico Nal",saldo:360672,cuota:42000,dia:20,det:"Cancelada",conf:false,cat:"tc",contado:false,hist:{}},d6:{n:"Credito papa",saldo:null,cuota:280000,dia:15,det:"Confirmar",conf:false,cat:"persona",contado:false,hist:{}},d7:{n:"EPM atrasos",saldo:287500,cuota:0,det:"Resto factura",conf:true,cat:"banco",contado:true,fechaPagoTotal:"2025-06-30",hist:{}},d8:{n:"Avance Deel",saldo:1229,cuota:0,det:"Recobro quincenal",conf:true,cat:"deel",usd:true,contado:false,hist:{}}},
itinerantes:{},imprevistos:{},inversiones:{},ingresos:{},qPagos:{}};

async function init(){D=await fb("GET","");if(!D||!D.config){await fb("PUT","",SEED);D=SEED}
["fijos","deudas","itinerantes","imprevistos","inversiones","ingresos","qPagos","subcats"].forEach(function(k){if(!D[k])D[k]={}});render()}

// Build checklist for a specific quincena
function buildCL(qi){
var items=[];
oe(D.fijos).forEach(function(x){var f=x[1];var vence=payDateInQ(f.dia,qi);if(!vence)return;
var times=f.mult||1;for(var t=0;t<times;t++){items.push({src:"fijo",srcId:x[0],n:f.n+(times>1?" ("+(t+1)+")":""),m:f.m,mon:"COP",vence:vence,pri:0,tipo:"fijo"})}});
oe(D.deudas).forEach(function(x){var d=x[1];if(d.saldo===0)return;
if(d.contado){if(d.fechaPagoTotal){var fpd=new Date(d.fechaPagoTotal+"T00:00:00");var fDay=fpd.getDate();var fMon=fpd.getMonth();if(fMon===qi.month&&fDay>=qi.startDay&&fDay<=qi.endDay){items.push({src:"deuda",srcId:x[0],n:d.n+" (contado)",m:d.saldo||0,mon:d.usd?"USD":"COP",vence:d.fechaPagoTotal,pri:0,tipo:"deuda",saldo:d.saldo,usd:d.usd})}}return}
if(!d.cuota||d.cuota<=0)return;
var vence=payDateInQ(d.dia,qi);if(!vence)return;
items.push({src:"deuda",srcId:x[0],n:d.n,m:d.cuota,mon:d.usd?"USD":"COP",vence:vence,pri:0,tipo:"deuda",saldo:d.saldo,cupoDisp:d.cupoDisp,usd:d.usd})});
oe(D.itinerantes).forEach(function(x){if(x[1].pagado)return;if(!x[1].vence)return;
var vd=new Date(x[1].vence+"T00:00:00");if(vd.getMonth()===qi.month&&vd.getDate()>=qi.startDay&&vd.getDate()<=qi.endDay){
items.push({src:"it",srcId:x[0],n:x[1].desc,m:x[1].monto,mon:x[1].moneda||"COP",vence:x[1].vence,pri:2,tipo:"itinerante",debeA:x[1].debeA})}});
oe(D.imprevistos).forEach(function(x){if(x[1].pagado)return;if(!x[1].vence)return;
var vd=new Date(x[1].vence+"T00:00:00");if(vd.getMonth()===qi.month&&vd.getDate()>=qi.startDay&&vd.getDate()<=qi.endDay){
items.push({src:"imp",srcId:x[0],n:x[1].desc,m:x[1].monto,mon:x[1].moneda||"COP",vence:x[1].vence,pri:1,tipo:"imprevisto",debeA:x[1].debeA})}});
// Check paid
items.forEach(function(it){var pk=it.src+"_"+it.srcId;if(D.qPagos[qi.key]&&D.qPagos[qi.key][pk]){it.pagado=true;it.montoReal=D.qPagos[qi.key][pk].monto;it.medioPago=D.qPagos[qi.key][pk].medio;it.monReal=D.qPagos[qi.key][pk].moneda||it.mon}});
// Accumulation auto-priority
var nc={};items.filter(function(x){return!x.pagado}).forEach(function(x){var b=x.n.replace(/\s*\(.*\)/,"").toLowerCase().trim();nc[b]=(nc[b]||0)+1});
items.forEach(function(x){if(x.pagado)return;var b=x.n.replace(/\s*\(.*\)/,"").toLowerCase().trim();if(b.indexOf("manutencion")>=0)x.pri=0;else if(nc[b]>1)x.pri=0});
items.sort(function(a,b){if(a.pagado!==b.pagado)return a.pagado?1:-1;return a.pri!==b.pri?a.pri-b.pri:(a.vence||"z").localeCompare(b.vence||"z")});
return{items:items,accum:Object.keys(nc).filter(function(k){return nc[k]>1})};
}

// Income average (max 2 per quincena for average)
function ingAvg(){
var all=oe(D.ingresos).sort(function(a,b){return(a[1].fecha||"").localeCompare(b[1].fecha||"")});
var byQ={};all.forEach(function(x){var d=new Date(x[1].fecha+"T00:00:00");var q=qInfo(d);if(!byQ[q.key])byQ[q.key]=[];byQ[q.key].push(x[1])});
var sums=[];Object.values(byQ).forEach(function(arr){var normal=arr.slice(0,2);var totalCOP=normal.reduce(function(s,x){return s+(x.moneda==="USD"?0:x.monto)},0);var totalUSD=normal.reduce(function(s,x){return s+(x.moneda==="USD"?x.monto:0)},0);sums.push({cop:totalCOP,usd:totalUSD})});
if(!sums.length)return{cop:0,usd:0};
return{cop:Math.round(sums.reduce(function(s,x){return s+x.cop},0)/sums.length),usd:parseFloat((sums.reduce(function(s,x){return s+x.usd},0)/sums.length).toFixed(2))}
}

function payItem(itJson){
var it=JSON.parse(itJson);
var isDeuda=it.tipo==="deuda";var isUSD=it.mon==="USD";
var h='<p style="font-size:15px;font-weight:500;margin-bottom:6px">'+it.n+'</p>';
h+='<div class="pill" style="background:'+(isUSD?"var(--teal)":"var(--blue)")+';color:#fff;margin-bottom:10px">'+(isUSD?"USD":"COP")+'</div>';
h+='<div class="fg"><label class="lb">Monto real pagado'+(isUSD?" (USD)":"")+'</label><input id="piM" type="number" step="0.01" value="'+it.m+'" /></div>';
h+='<div class="fg"><label class="lb">Medio de pago</label><select id="piMed">'+MEDIOS.map(function(m){return"<option>"+m+"</option>"}).join("")+"</select></div>";
if(isDeuda){
h+='<div class="fg"><label class="lb">Saldo restante'+(isUSD?" (USD)":"")+'</label><input id="piSaldo" type="number" step="0.01" value="'+(it.saldo||"")+'" /></div>';
if(it.cupoDisp!==undefined)h+='<div class="fg"><label class="lb">Cupo disponible TC</label><input id="piCupo" type="number" step="0.01" value="'+(it.cupoDisp||"")+'" /></div>'}
h+='<button class="btn btn-g" onclick="confirmPay(\''+it.src+"','"+it.srcId+"','"+it.vence+"','"+it.mon+"',"+isDeuda+')">Confirmar pago</button>';
modal("Pagar",h)}

async function confirmPay(src,srcId,vence,mon,isDeuda){
var monto=parseFloat(document.getElementById("piM").value)||0;var medio=document.getElementById("piMed").value;
if(!monto)return toast("Monto requerido");
var d=new Date(vence+"T00:00:00");var qi=qInfo(d);var pk=src+"_"+srcId;
if(!D.qPagos[qi.key])D.qPagos[qi.key]={};
D.qPagos[qi.key][pk]={monto:monto,medio:medio,moneda:mon,fecha:new Date().toISOString().slice(0,10)};
await fb("PUT","qPagos/"+qi.key+"/"+pk,D.qPagos[qi.key][pk]);
if(isDeuda&&document.getElementById("piSaldo")){var s=parseFloat(document.getElementById("piSaldo").value);if(!isNaN(s)){D.deudas[srcId].saldo=s;D.deudas[srcId].conf=true;var mk=new Date().toISOString().slice(0,7);if(!D.deudas[srcId].hist)D.deudas[srcId].hist={};D.deudas[srcId].hist[mk]=s;await fb("PUT","deudas/"+srcId+"/hist/"+mk,s);await sv("deudas/"+srcId,{saldo:s,conf:true})}

var qi=qInfo();var cl=buildCL(qi);
var pendItems=cl.items.filter(function(x){return!x.pagado});
var paidItems=cl.items.filter(function(x){return x.pagado});
var totalPendCOP=pendItems.filter(function(x){return x.mon!=="USD"}).reduce(function(s,x){return s+x.m},0);
var totalPendUSD=pendItems.filter(function(x){return x.mon==="USD"}).reduce(function(s,x){return s+x.m},0);
var avg=ingAvg();
var h="";
